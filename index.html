<script>
/* [v4.7.42] 캐시 강제 리셋 — SW 완전 제거 후 리로드 */
(function(){
  var VER = 'v4910-w1r4-state-lock-2-action-fix-2';  // [State Lock 2 fix-2] v4720 호출 차단 + pending mutex + sync 후 clear + canonical 정규화
  try {
    var LKEY = 'woos_hard_reset_ver';
    if (localStorage.getItem(LKEY) === VER) return;
  } catch(e) {}

  var jobs = [];

  if ('serviceWorker' in navigator) {
    jobs.push(
      navigator.serviceWorker.getRegistrations()
        .then(function(regs){
          return Promise.all(regs.map(function(reg){ return reg.unregister(); }));
        }).catch(function(){})
    );
  }

  if (window.caches && caches.keys) {
    jobs.push(
      caches.keys()
        .then(function(keys){
          return Promise.all(keys.map(function(key){ return caches.delete(key); }));
        }).catch(function(){})
    );
  }

  Promise.all(jobs).then(function(){
    try { localStorage.setItem('woos_hard_reset_ver', VER); } catch(e){}
    var url = new URL(location.href);
    if (url.searchParams.get('v') !== VER) {
      url.searchParams.set('v', VER);
      location.replace(url.toString());
    }
  }).catch(function(){
    try { localStorage.setItem('woos_hard_reset_ver', VER); } catch(e){}
    location.reload();
  });
})();
</script>

#summaryBar.visible { display: flex; }
.sum-card {
  flex: 1; min-width: 100px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  position: relative; overflow: hidden;
}
.sum-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.sum-card.sc-total::before  { background: var(--accent-cyan); }
.sum-card.sc-strong::before { background: var(--accent-red); }
.sum-card.sc-watch::before  { background: var(--accent-orange); }
.sum-card.sc-score::before  { background: var(--accent-green); }
.sum-label { font-size: .58rem; color: var(--text-muted); font-family: var(--mono); letter-spacing: 1px; margin-bottom: 4px; }
.sum-val { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; }
.sum-card.sc-total  .sum-val { color: var(--accent-cyan); }
.sum-card.sc-strong .sum-val { color: var(--accent-red); }
.sum-card.sc-watch  .sum-val { color: var(--accent-orange); }
.sum-card.sc-score  .sum-val { color: var(--accent-green); }

/* ══════════════════════════════════════════
   필터 바
══════════════════════════════════════════ */
#filterBar {
  display: none; gap: 6px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
}
#filterBar.visible { display: flex; }
.filter-label { font-family: var(--mono); font-size: .6rem; color: var(--text-muted); }
.grade-filter {
  padding: 4px 10px; border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  font-family: var(--mono); font-size: .65rem;
  transition: all .15s;
}
.grade-filter.f-active { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,212,255,.07); }
.sort-select {
  margin-left: auto;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 3px; padding: 4px 8px;
  color: var(--text-secondary); font-family: var(--mono); font-size: .62rem;
}

/* ══════════════════════════════════════════
   결과 리스트
══════════════════════════════════════════ */
#resultList { display: flex; flex-direction: column; gap: 8px; }
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted); font-family: var(--mono); font-size: .75rem;
  line-height: 2.5;
}

/* ══════════════════════════════════════════
   결과 카드
══════════════════════════════════════════ */
.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .2s;
  animation: fadeSlide .35s ease-out;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.result-card:hover { border-color: var(--border-bright); }
.result-card/* ── 등급 색상 변수 ── */
:root {
  --grade-sp: #FF2D55;
  --grade-s:  #FF6B35;
  --grade-a:  #FF9500;
  --grade-b:  #FFD60A;
  --grade-c:  #8E8E93;
}

/* ── 카드 좌측 보더 ── */
.result-card.grade-SP { border-left: 4px solid var(--grade-sp); }
.result-card.grade-S  { border-left: 4px solid var(--grade-s);  }
.result-card.grade-A  { border-left: 4px solid var(--grade-a);  }
.result-card.grade-B  { border-left: 4px solid var(--grade-b);  }
.result-card.grade-C  { border-left: 4px solid var(--grade-c);  }

/* ── 등급 뱃지 — 불투명 배경으로 가독성 확보 ── */
.grade-badge.grade-SP {
  background: var(--grade-sp);
  color: #fff;
  border: none;
  font-weight: 800;
  font-size: .8rem;
  text-shadow: 0 1px 2px rgba(0,0,0,.4);
  box-shadow: 0 2px 8px rgba(255,45,85,.5);
  animation: spPulse 2s ease-in-out infinite;
}
@keyframes spPulse {
  0%,100% { box-shadow: 0 2px 8px rgba(255,45,85,.5); }
  50%     { box-shadow: 0 2px 16px rgba(255,45,85,.9); }
}
.grade-badge.grade-S {
  background: var(--grade-s);
  color: #fff;
  border: none;
  font-weight: 700;
  text-shadow: 0 1px 2px rgba(0,0,0,.3);
}
.grade-badge.grade-A {
  background: var(--grade-a);
  color: #fffdf7;
  border: none;
  font-weight: 700;
}
.grade-badge.grade-B {
  background: var(--grade-b);
  color: #fff;
  border: none;
  font-weight: 700;
  text-shadow: 0 1px 2px rgba(0,0,0,.5);
}
.grade-badge.grade-C {
  background: rgba(142,142,147,.25);
  color: #ccc;
  border: 1px solid rgba(142,142,147,.4);
}

/* ── ENTRY READY 배너 ── */
.entry-ready-banner {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; margin-bottom: 5px;
  background: #00c06b;
  border-radius: 4px;
  font-family: var(--mono); font-size: .75rem;
  font-weight: 800; color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,.3);
  letter-spacing: 1px;
  animation: entryPulse 2s ease-in-out infinite;
}
@keyframes entryPulse {
  0%,100% { background: #00c06b; }
  50%     { background: #00e67a; }
}
.entry-ready-banner::before { content: '✅ '; }

/* ── 요약 카드 등급별 수치 색상 ── */
.sc-sp .sum-val { color: var(--grade-sp); font-weight:800; }
.sc-s  .sum-val { color: var(--grade-s);  font-weight:700; }
.sc-a  .sum-val { color: var(--grade-a);  font-weight:700; }

/* 카드 헤더 (항상 보임) */
.card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer;
  user-select: none;
}
.grade-badge {
  width: 32px; height: 32px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: .9rem; font-weight: 700;
  flex-shrink: 0;
}
.grade-S { background: rgba(255,69,96,.15); color: var(--accent-red); border: 1px solid rgba(255,69,96,.4); }
.grade-A { background: rgba(255,140,66,.12); color: var(--accent-orange); border: 1px solid rgba(255,140,66,.35); }
.grade-B { background: rgba(255,214,0,.08); color: var(--accent-yellow); border: 1px solid rgba(255,214,0,.3); }
.grade-C { background: rgba(58,90,114,.2); color: var(--text-muted); border: 1px solid var(--border); }

.card-main { flex: 1; min-width: 0; }
.card-symbol {
  font-family: var(--mono); font-size: .9rem; font-weight: 700;
  color: var(--text-primary); margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.card-symbol .ex-tags { display: flex; gap: 3px; }
.ex-tag {
  font-size: .52rem; padding: 1px 5px;
  border-radius: 2px; border: 1px solid;
  font-family: var(--mono);
}
.ex-tag-upbit   { border-color: rgba(76,139,255,.5);  color: #6aa3ff; background: rgba(76,139,255,.08); }
.ex-tag-binance { border-color: rgba(240,185,11,.4);  color: #f0b90b; background: rgba(240,185,11,.06); }

.card-signals { display: flex; gap: 4px; flex-wrap: wrap; }
.sig-tag {
  font-size: .58rem; padding: 2px 6px;
  border-radius: 2px; font-family: var(--mono);
  border: 1px solid;
}
.sig-volume   { border-color: rgba(0,212,255,.3);  color: var(--accent-cyan);   background: rgba(0,212,255,.06); }
.sig-breakout { border-color: rgba(0,230,118,.3);  color: var(--accent-green);  background: rgba(0,230,118,.06); }
.sig-obv      { border-color: rgba(255,140,66,.3); color: var(--accent-orange); background: rgba(255,140,66,.06); }
.sig-macd     { border-color: rgba(76,139,255,.3); color: #6aa3ff;              background: rgba(76,139,255,.06); }
.sig-liquidity{ border-color: rgba(156,39,176,.3); color: #ce93d8;              background: rgba(156,39,176,.06); }
.sig-warn     { border-color: rgba(255,69,96,.3);  color: var(--accent-red);    background: rgba(255,69,96,.06); }

.card-right { text-align: right; flex-shrink: 0; }
.card-score { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; }
.card-change { font-family: var(--mono); font-size: .7rem; margin-top: 2px; }
.change-pos { color: var(--accent-green); }
.change-neg { color: var(--accent-red); }
.card-chevron {
  font-size: .7rem; color: var(--text-muted); margin-left: 8px;
  transition: transform .2s; flex-shrink: 0;
}
.card-chevron.open { transform: rotate(180deg); }

/* ══════════════════════════════════════════
   카드 상세 패널
══════════════════════════════════════════ */
.card-detail {
  border-top: 1px solid var(--border);
  padding: 14px;
  display: none;
  animation: expandIn .25s ease-out;
}
.card-detail.open { display: block; }
@keyframes expandIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

/* 상세 섹션 */
.detail-section { margin-bottom: 14px; }
.detail-section:last-child { margin-bottom: 0; }
.detail-section-title {
  font-family: var(--mono); font-size: .6rem; color: var(--accent-cyan);
  letter-spacing: 2px; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}

/* 지표 그리드 */
.indicator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.ind-item {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 4px; padding: 8px 10px;
}
.ind-label { font-size: .6rem; color: var(--text-muted); font-family: var(--mono); margin-bottom: 4px; }
.ind-value { font-family: var(--mono); font-size: .82rem; font-weight: 600; }
.val-bull { color: var(--accent-green); }
.val-bear { color: var(--accent-red); }
.val-neutral { color: var(--text-secondary); }
.val-warn { color: var(--accent-yellow); }

/* 거래소 비교 행 */
.ex-compare { display: flex; flex-direction: column; gap: 6px; }
.ex-compare-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 4px; padding: 8px 10px;
}
.ex-compare-name { font-family: var(--mono); font-size: .65rem; width: 64px; flex-shrink: 0; }
.ex-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.ex-bar { height: 100%; border-radius: 2px; transition: width .6s ease; }
.ex-compare-val { font-family: var(--mono); font-size: .68rem; width: 42px; text-align: right; }
.ex-compare-status { font-size: .6rem; font-family: var(--mono); color: var(--text-muted); }

/* 구조 판정 */
.structure-box {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 4px; padding: 10px 12px;
}
.structure-label { font-size: .6rem; color: var(--text-muted); font-family: var(--mono); margin-bottom: 4px; }
.structure-text { font-size: .78rem; color: var(--text-primary); line-height: 1.6; }

/* 세력매집 코멘트 */
.accumulation-box {
  background: rgba(0,212,255,.04); border: 1px solid rgba(0,212,255,.2);
  border-radius: 4px; padding: 10px 12px;
  font-size: .75rem; color: var(--text-secondary); line-height: 1.7;
}

/* 리스크 */
.risk-list { display: flex; flex-direction: column; gap: 4px; }
.risk-item {
  display: flex; align-items: flex-start; gap: 6px;
  font-size: .7rem; color: var(--text-secondary); line-height: 1.5;
}
.risk-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent-red); margin-top: 6px; flex-shrink: 0; }

/* 목표가 */
.target-grid { display: grid; grid-template-columns: repeat(3,1fr) auto; gap: 6px; }
.target-item {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 4px; padding: 8px; text-align: center;
}
.target-label { font-size: .58rem; color: var(--text-muted); font-family: var(--mono); margin-bottom: 3px; }
.target-val { font-family: var(--mono); font-size: .75rem; font-weight: 700; }
.target-1 .target-val { color: var(--accent-green); }
.target-2 .target-val { color: var(--accent-cyan); }
.target-3 .target-val { color: var(--accent-orange); }
.stop-item .target-val { color: var(--accent-red); }

/* 총평 / 액션 */
.action-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 4px; padding: 10px 12px;
}
.action-badge {
  padding: 4px 10px; border-radius: 3px;
  font-family: var(--mono); font-size: .68rem; font-weight: 700;
  flex-shrink: 0; white-space: nowrap;
}
.action-enter    { background: rgba(0,230,118,.15); color: var(--accent-green);  border: 1px solid rgba(0,230,118,.3); }
.action-split    { background: rgba(0,212,255,.12); color: var(--accent-cyan);   border: 1px solid rgba(0,212,255,.3); }
.action-pullback { background: rgba(255,214,0,.1);  color: var(--accent-yellow); border: 1px solid rgba(255,214,0,.3); }
.action-watch    { background: rgba(58,90,114,.2);  color: var(--text-secondary);border: 1px solid var(--border); }
.action-avoid    { background: rgba(255,69,96,.12); color: var(--accent-red);    border: 1px solid rgba(255,69,96,.3); }
.action-text { font-size: .72rem; color: var(--text-secondary); line-height: 1.5; }

/* 차트 링크 */
.chart-links { display: flex; gap: 6px; flex-wrap: wrap; }
.chart-link {
  display: flex; align-items: center; gap: 4px;
  padding: 7px 12px; border-radius: var(--radius);
  border: 1px solid var(--border-bright);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-family: var(--mono); font-size: .65rem;
  transition: all .15s; text-decoration: none;
}
.chart-link:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,212,255,.06); }

/* 점수 분해 */
.score-breakdown { display: flex; flex-direction: column; gap: 5px; }
.score-row { display: flex; align-items: center; gap: 6px; }
.score-row-label { font-size: .62rem; color: var(--text-muted); font-family: var(--mono); width: 120px; flex-shrink: 0; }
.score-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.score-row-val { font-family: var(--mono); font-size: .6rem; width: 40px; text-align: right; }

/* ══════════════════════════════════════════
   하단 면책 고지
══════════════════════════════════════════ */
#footer {
  text-align: center; padding: 24px 0 12px;
  font-size: .6rem; color: var(--text-muted);
  font-family: var(--mono); line-height: 2;
}

/* ══════════════════════════════════════════
   TradingView 차트 모달
══════════════════════════════════════════ */
#tvModal {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(4,8,14,.92);
  backdrop-filter: blur(6px);
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px;
}
#tvModal.open { display: flex; }

.tv-modal-inner {
  width: 100%; max-width: 860px;
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 10px;
  overflow: hidden;
  display: flex; flex-direction: column;
  max-height: 92vh;
  box-shadow: 0 0 40px rgba(0,212,255,.15);
}

.tv-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tv-modal-title {
  font-family: var(--mono); font-size: .78rem;
  color: var(--accent-cyan); letter-spacing: 2px;
}
.tv-modal-symbol {
  font-family: var(--mono); font-size: .75rem;
  color: var(--text-primary); font-weight: 700;
  margin-left: 10px;
}
.tv-modal-close {
  width: 30px; height: 30px; border-radius: 4px;
  border: 1px solid var(--border-bright);
  background: transparent; color: var(--text-secondary);
  font-size: 1rem; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
}
.tv-modal-close:hover { border-color: var(--accent-red); color: var(--accent-red); }

/* 인터벌 탭 */
.tv-interval-bar {
  display: flex; gap: 4px; padding: 8px 14px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
  align-items: center;
}
.tv-interval-label {
  font-family: var(--mono); font-size: .6rem;
  color: var(--text-muted); margin-right: 4px;
}
.iv-btn {
  padding: 4px 10px; border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  font-family: var(--mono); font-size: .65rem;
  cursor: pointer; transition: all .15s;
}
.iv-btn.active {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(0,212,255,.08);
}

/* 거래소 탭 */
.tv-ex-bar {
  display: flex; gap: 4px; padding: 0 14px 8px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tv-ex-btn {
  padding: 4px 12px; border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  font-family: var(--mono); font-size: .65rem;
  cursor: pointer; transition: all .15s;
}
.tv-ex-btn.active-upbit   { border-color: #4c8bff; color: #4c8bff; background: rgba(76,139,255,.1); }
.tv-ex-btn.active-binance { border-color: #f0b90b; color: #f0b90b; background: rgba(240,185,11,.08); }

/* 위젯 iframe 컨테이너 */
.tv-widget-wrap {
  flex: 1; min-height: 0;
  position: relative;
  background: #131722; /* TradingView 다크 배경색 */
}
.tv-widget-wrap iframe {
  width: 100%; height: 100%;
  border: none; display: block;
  min-height: 360px;
}
.tv-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #131722;
  font-family: var(--mono); font-size: .75rem;
  color: var(--text-muted); gap: 12px;
  transition: opacity .3s;
}
.tv-loading.hidden { opacity: 0; pointer-events: none; }
.tv-spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--accent-cyan);
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 하단 정보 바 */
.tv-info-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 14px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.tv-info-item { font-family: var(--mono); font-size: .62rem; color: var(--text-muted); }
.tv-info-item span { color: var(--text-secondary); }
.tv-ext-links { margin-left: auto; display: flex; gap: 6px; }
.tv-ext-link {
  padding: 4px 10px; border-radius: 3px;
  border: 1px solid var(--border-bright);
  background: transparent; color: var(--text-muted);
  font-family: var(--mono); font-size: .6rem;
  text-decoration: none; transition: all .15s;
}
.tv-ext-link:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

/* 카드 내 차트 열기 버튼 */
.chart-open-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: var(--radius);
  border: 1px solid var(--accent-cyan);
  background: rgba(0,212,255,.06);
  color: var(--accent-cyan);
  font-family: var(--mono); font-size: .7rem;
  cursor: pointer; transition: all .2s;
  letter-spacing: 1px;
}
.chart-open-btn:hover {
  background: rgba(0,212,255,.14);
  box-shadow: var(--glow-cyan);
}
.chart-open-btn-ex {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 12px; border-radius: var(--radius);
  border: 1px solid var(--border-bright);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-family: var(--mono); font-size: .65rem;
  text-decoration: none; transition: all .15s;
}
.chart-open-btn-ex:hover { border-color: var(--border-bright); color: var(--text-primary); }


/* ── PRE-PUMP 뱃지 ── */
.prepump-badge {
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:3px;
  font-family:var(--mono);font-size:.62rem;font-weight:700;
  background:rgba(156,39,176,.15);color:#ce93d8;
  border:1px solid rgba(156,39,176,.4);
  animation: prepumpPulse 2s ease-in-out infinite;
}
@keyframes prepumpPulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── 3점수 디스플레이 ── */
.triple-score {
  display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;
}
.tscore-item {
  flex:1;min-width:80px;
  background:var(--bg-secondary);border:1px solid var(--border);
  border-radius:4px;padding:8px;text-align:center;
}
.tscore-label { font-size:.58rem;color:var(--text-muted);font-family:var(--mono);margin-bottom:4px; }
.tscore-val   { font-family:var(--mono);font-size:1rem;font-weight:700; }
.tscore-structure { color:var(--accent-cyan); }
.tscore-entry     { color:var(--accent-green); }
.tscore-risk      { color:var(--accent-red); }

/* ── 퀵 필터 버튼 ── */
.quick-filter-bar {
  display:none;gap:6px;margin-bottom:10px;flex-wrap:wrap;
}
.quick-filter-bar.visible { display:flex; }
.qf-btn {
  padding:6px 12px;border-radius:4px;
  border:1px solid var(--border);
  background:var(--bg-card);color:var(--text-muted);
  font-family:var(--mono);font-size:.65rem;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.qf-btn.active-entry   { border-color:var(--accent-green);color:var(--accent-green);background:rgba(0,230,118,.08); }
.qf-btn.active-prepump { border-color:#ce93d8;color:#ce93d8;background:rgba(156,39,176,.08); }
.qf-btn.active-all     { border-color:var(--accent-cyan);color:var(--accent-cyan);background:rgba(0,212,255,.08); }

/* ── 모바일 가독성 개선 ── */
.ind-item { padding:10px 12px !important; }
.target-val { font-size:.95rem !important;font-weight:800 !important; }
.target-label { font-size:.65rem !important; }
.action-badge { font-size:.78rem !important;padding:6px 14px !important; }

/* ── BTC 필터 경고 ── */
.btc-warning {
  background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.3);
  border-radius:4px;padding:8px 12px;margin-bottom:8px;
  font-family:var(--mono);font-size:.65rem;color:var(--accent-red);
}
/* ── 캐시 알림 ── */
.cache-notice {
  background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);
  border-radius:4px;padding:6px 12px;margin-bottom:10px;
  font-family:var(--mono);font-size:.62rem;color:var(--accent-cyan);
  display:none;
}
.cache-notice.visible { display:flex;align-items:center;justify-content:space-between; }


/* ── 뉴스 섹션 ── */
.news-section { margin-top:4px; }
.news-loading {
  display:flex;align-items:center;gap:6px;padding:8px;
  font-family:var(--mono);font-size:.65rem;color:var(--text-muted);
}
.news-spinner {
  width:12px;height:12px;border-radius:50%;
  border:1.5px solid var(--border);border-top-color:var(--accent-cyan);
  animation:spin 1s linear infinite;flex-shrink:0;
}
.news-empty {
  padding:8px;font-family:var(--mono);font-size:.63rem;
  color:var(--text-muted);text-align:center;
}
.news-article {
  padding:9px 10px;border-radius:4px;margin-bottom:6px;
  background:var(--bg-secondary);border:1px solid var(--border);
  transition:border-color .15s;
}
.news-article:hover { border-color:var(--border-bright); }
.news-article:last-child { margin-bottom:0; }
.news-title {
  font-size:.73rem;color:var(--text-primary);line-height:1.5;
  margin-bottom:4px;word-break:keep-all;
}
.news-title a { text-decoration:none;color:inherit; }
.news-title a:hover { color:var(--accent-cyan); }
.news-meta {
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  font-family:var(--mono);font-size:.58rem;color:var(--text-muted);
}
.news-source { color:var(--accent-cyan); }
.news-time   { }
.news-error  {
  padding:8px 10px;border-radius:4px;
  background:rgba(255,69,96,.06);border:1px solid rgba(255,69,96,.2);
  font-family:var(--mono);font-size:.63rem;color:var(--accent-red);
}

/* ── 텔레그램 설정 패널 ── */
#telegramPanel {
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:14px;
  display:none;
}
#telegramPanel.visible { display:block; }
.tg-header {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.tg-title {
  font-family:var(--mono);font-size:.65rem;
  color:var(--accent-cyan);letter-spacing:2px;
}
.tg-toggle-btn {
  padding:4px 10px;border-radius:3px;
  border:1px solid var(--border-bright);
  background:transparent;color:var(--text-muted);
  font-family:var(--mono);font-size:.62rem;cursor:pointer;
  transition:all .15s;
}
.tg-toggle-btn.active { border-color:var(--accent-green);color:var(--accent-green); }
.tg-status {
  font-family:var(--mono);font-size:.62rem;padding:4px 8px;
  border-radius:3px;border:1px solid var(--border);
}
.tg-status.ok   { border-color:var(--accent-green);color:var(--accent-green); }
.tg-status.fail { border-color:var(--accent-red);color:var(--accent-red); }
.tg-cooldown-info {
  font-family:var(--mono);font-size:.6rem;color:var(--text-muted);
  margin-top:8px;line-height:1.8;
}
.tg-test-btn {
  padding:7px 16px;border-radius:var(--radius);
  border:1px solid var(--border-bright);
  background:transparent;color:var(--text-secondary);
  font-family:var(--mono);font-size:.68rem;cursor:pointer;
  transition:all .15s;
}
.tg-test-btn:hover { border-color:var(--accent-cyan);color:var(--accent-cyan); }


/* ── 구조 해석 3줄 (강점/약점/결론) ── */
.analysis-3line {
  display:flex;flex-direction:column;gap:6px;
  padding:10px;background:var(--bg-secondary);
  border-radius:4px;border:1px solid var(--border);
}
.analysis-row {
  display:flex;gap:8px;align-items:flex-start;
  font-family:var(--mono);font-size:.68rem;line-height:1.5;
}
.analysis-label {
  flex-shrink:0;width:56px;font-weight:700;
}
.analysis-row.strength .analysis-label { color:var(--accent-green); }
.analysis-row.weakness .analysis-label { color:var(--accent-orange); }
.analysis-row.conclusion .analysis-label { color:var(--accent-cyan); }
.analysis-content { color:var(--text-secondary);flex:1; }

/* ── 리스크 카테고리 뱃지 ── */
.risk-categorized {
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 10px;border-radius:4px;margin-bottom:5px;
  background:rgba(255,69,96,.06);border:1px solid rgba(255,69,96,.15);
  font-family:var(--mono);font-size:.67rem;color:var(--text-secondary);
}
.risk-cat-badge {
  flex-shrink:0;padding:1px 7px;border-radius:3px;
  font-size:.58rem;font-weight:700;
  background:rgba(255,69,96,.2);color:var(--accent-red);
  border:1px solid rgba(255,69,96,.3);white-space:nowrap;
}

/* ── 총점 요약 라인 ── */
.score-summary-line {
  padding:8px 12px;margin-bottom:8px;
  background:var(--bg-secondary);border-radius:4px;
  border-left:3px solid var(--accent-cyan);
  font-family:var(--mono);font-size:.7rem;
  color:var(--accent-cyan);line-height:1.6;
  word-break:keep-all;
}

/* ── 액션 설명형 ── */
.action-desc {
  display:block;margin-top:6px;
  font-family:var(--mono);font-size:.67rem;
  color:var(--text-secondary);line-height:1.5;
}
.action-sub-info {
  margin-top:6px;font-family:var(--mono);
  font-size:.6rem;color:var(--text-muted);
}


/* ── v2 빗썸 + 동조 신호 스타일 ── */
.ex-toggle.active-bithumb  { border-color:#00a0ff; color:#00a0ff; }
.ex-tag-bithumb            { background:rgba(0,160,255,.15); color:#00a0ff; }
.ex-compare-bithumb        { color:#00a0ff; }

/* 거래소 존재 배지 */
.exists-tag {
  display:inline-block;padding:1px 6px;border-radius:3px;
  font-size:.58rem;font-family:var(--mono);font-weight:700;
  margin-right:3px;
}
.exists-upbit   { background:rgba(0,199,190,.15);color:#00c7be; }
.exists-bithumb { background:rgba(0,160,255,.15);color:#00a0ff; }
.exists-binance { background:rgba(0,230,118,.15);color:#00e676; }

/* 거래소 비교 테이블 */
.ex-compare-table {
  background:var(--bg-secondary);border-radius:4px;
  border:1px solid var(--border);padding:8px;
  font-family:var(--mono);font-size:.67rem;
}
.ex-compare-row-v2 {
  display:flex;align-items:center;gap:8px;padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.ex-compare-row-v2:last-child { border-bottom:none; }
.ex-rep-badge {
  font-size:.55rem;padding:1px 5px;border-radius:2px;
  background:rgba(255,255,255,.1);color:var(--text-muted);
}
.ex-rep-badge.is-rep { background:rgba(255,159,0,.2);color:var(--accent-orange); }

/* 동조 신호 배지 */
.sync-badge {
  display:inline-block;padding:2px 8px;border-radius:3px;
  font-size:.65rem;font-family:var(--mono);font-weight:700;
}
.sync-strong { background:rgba(0,230,118,.15);color:#00e676;border:1px solid rgba(0,230,118,.3); }
.sync-weak   { background:rgba(255,159,0,.1);color:var(--accent-orange);border:1px solid rgba(255,159,0,.2); }
.sync-solo   { background:rgba(142,142,147,.1);color:var(--text-muted);border:1px solid rgba(142,142,147,.2); }

/* 대표 거래소 배너 */
.rep-exchange-banner {
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;margin-bottom:6px;border-radius:3px;
  background:var(--bg-secondary);border:1px solid var(--border);
  font-family:var(--mono);font-size:.65rem;
}
.rep-exchange-label { color:var(--text-muted); }
.rep-exchange-name  { font-weight:700;color:var(--accent-cyan); }

/* 요약바 동조 */
.sc-sync { border-color:var(--accent-cyan); }
.sc-sync .sum-val { color:var(--accent-cyan); }



/* ── [UI FIX] 대비/가독성 강화 ───────────────────────────────── */
.result-card.grade-B{
  background:linear-gradient(180deg, rgba(255,214,10,.08), rgba(15,26,39,.95));
  border-color:rgba(255,214,10,.35);
}
.result-card.grade-C{
  background:linear-gradient(180deg, rgba(142,142,147,.10), rgba(15,26,39,.95));
  border-color:rgba(142,142,147,.35);
}
.grade-badge.grade-B{
  background:var(--grade-b) !important;
  color:#111827 !important;
  border:none !important;
  font-weight:800 !important;
  text-shadow:none !important;
  box-shadow:0 2px 12px rgba(255,214,10,.35);
}
.grade-badge.grade-C{
  background:#6b7280 !important;
  color:#f8fafc !important;
  border:none !important;
  font-weight:800 !important;
  box-shadow:0 2px 10px rgba(107,114,128,.28);
}
.card-header{ background:rgba(255,255,255,.02); }
.card-symbol{ font-size:1rem; font-weight:800; }
.card-score{ font-size:1.45rem; font-weight:800; }
.card-change{ font-size:.78rem; font-weight:700; }

.detail-section-title{
  color:#57e7ff !important;
  font-size:.72rem !important;
  font-weight:800;
  padding-bottom:6px;
}
.detail-card{
  background:#0d1724;
  border:1px solid #23445f;
  border-radius:10px;
  padding:12px 14px;
  box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}
.detail-kicker{
  font-family:var(--mono);
  font-size:.62rem;
  letter-spacing:1.2px;
  color:#6c93b3;
  margin-bottom:8px;
}
.detail-big{
  font-family:var(--mono);
  font-size:1.78rem;
  font-weight:800;
  color:#f4f8ff;
  line-height:1.1;
}
.detail-sub{
  margin-top:8px;
  color:#b7c8da;
  font-size:.78rem;
  line-height:1.6;
}
.position-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.target-grid-v2{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:10px;
}
.target-card{
  background:#0d1724;
  border:1px solid #21445f;
  border-radius:10px;
  padding:12px;
}
.target-card .t-label{
  font-family:var(--mono);
  font-size:.64rem;
  color:#7d9ab6;
  margin-bottom:8px;
}
.target-card .t-value{
  font-family:var(--mono);
  font-size:1.55rem;
  font-weight:800;
  line-height:1.1;
}
.target-card .t-note{
  margin-top:8px;
  color:#93a9c0;
  font-size:.72rem;
}
.target-card.target1 .t-value{ color:var(--accent-green); }
.target-card.target2 .t-value{ color:var(--accent-cyan); }
.target-card.target3 .t-value{ color:var(--accent-orange); }
.target-card.stoploss .t-value{ color:var(--accent-red); }

.position-card.current .detail-big{ color:var(--accent-green); }
.position-card.now .detail-big{ color:#f8fbff; }
.position-state-ok{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:10px;padding:4px 10px;border-radius:999px;
  background:rgba(0,230,118,.12); color:var(--accent-green);
  border:1px solid rgba(0,230,118,.25);
  font-family:var(--mono); font-size:.7rem; font-weight:700;
}
.position-state-no{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:10px;padding:4px 10px;border-radius:999px;
  background:rgba(255,69,96,.10); color:var(--accent-red);
  border:1px solid rgba(255,69,96,.25);
  font-family:var(--mono); font-size:.7rem; font-weight:700;
}

.score-viz-wrap{
  display:flex; flex-direction:column; gap:10px;
}
.score-head-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.score-head-card{
  background:#0d1724;border:1px solid #21445f;border-radius:10px;padding:12px;
}
.score-head-label{
  font-family:var(--mono);font-size:.62rem;color:#7d9ab6;margin-bottom:8px;
}
.score-head-value{
  font-family:var(--mono);font-size:1.32rem;font-weight:800;color:#f6fbff;
}
.score-head-card.structure .score-head-value{ color:var(--accent-cyan); }
.score-head-card.entry .score-head-value{ color:var(--accent-green); }
.score-head-card.risk .score-head-value{ color:var(--accent-orange); }

.score-group{
  background:#0d1724;border:1px solid #21445f;border-radius:10px;padding:12px;
}
.score-group-title{
  font-family:var(--mono);font-size:.68rem;font-weight:800;color:#d9ecff;
  margin-bottom:10px;
}
.score-bar-row{
  display:grid;
  grid-template-columns:92px 1fr 48px;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.score-bar-row:last-child{ margin-bottom:0; }
.score-bar-label{
  font-family:var(--mono); font-size:.66rem; color:#a8bfd6;
}
.score-bar-track{
  height:8px; border-radius:999px; background:#16283a; overflow:hidden;
  border:1px solid rgba(255,255,255,.03);
}
.score-bar-fill{
  height:100%; border-radius:999px;
}
.score-bar-fill.pos{ background:linear-gradient(90deg,#00d4ff,#00e676); }
.score-bar-fill.warn{ background:linear-gradient(90deg,#ffb74d,#ff8c42); }
.score-bar-fill.neg{ background:linear-gradient(90deg,#ff6b6b,#ff4560); }
.score-bar-val{
  font-family:var(--mono);font-size:.66rem;color:#f6fbff;text-align:right;
}
.analysis-panel,
.risk-panel{
  background:#0d1724;border:1px solid #21445f;border-radius:10px;padding:12px 14px;
}
.analysis-panel .row{
  display:flex; gap:10px; margin-bottom:8px; font-size:.72rem; line-height:1.6;
}
.analysis-panel .row:last-child{ margin-bottom:0; }
.analysis-panel .label{
  width:44px; flex-shrink:0; font-family:var(--mono); font-weight:800;
}
.analysis-panel .label.str{ color:var(--accent-green); }
.analysis-panel .label.weak{ color:var(--accent-orange); }
.analysis-panel .label.con{ color:var(--accent-cyan); }
.analysis-panel .content{ color:#c4d4e4; }

.risk-stack{ display:flex; flex-direction:column; gap:8px; }
.risk-item-v2{
  display:flex; gap:8px; align-items:flex-start;
  padding:8px 10px; border-radius:8px;
  background:#111f30; border:1px solid rgba(255,255,255,.04);
}
.risk-badge-v2{
  flex-shrink:0; padding:2px 8px; border-radius:999px;
  font-family:var(--mono); font-size:.6rem; font-weight:800;
  background:rgba(255,140,66,.12); color:var(--accent-orange);
  border:1px solid rgba(255,140,66,.25);
}
.risk-desc-v2{ color:#c2d2e2; font-size:.72rem; line-height:1.5; }

@media (max-width: 640px){
  .position-grid, .target-grid-v2, .score-head-grid{ grid-template-columns:1fr 1fr; }
  .score-head-grid .score-head-card.risk{ grid-column:1 / -1; }
  .score-bar-row{ grid-template-columns:76px 1fr 42px; }
  .detail-big{ font-size:1.55rem; }
}

}
.grade-filter.f-active {

}




/* ── [SNAPSHOT / BRIEFING] ───────────────── */
.briefing-box{
  background:rgba(0,212,255,.06);
  border:1px solid rgba(0,212,255,.18);
  border-radius:10px;
  padding:12px 14px;
  color:#d9e8f5;
  line-height:1.7;
  font-size:.78rem;
}
.snapshot-mode-banner{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(255,140,66,.10);
  border:1px solid rgba(255,140,66,.26);
  color:var(--accent-orange);
  padding:8px 12px;border-radius:8px;margin-bottom:12px;

/* ═══════════════════════════════════════════════════════════════
   [MODULE: phase22_tabs_css] — 상단 탭 바 (스캐너/스냅샷/24H Outcome)
   향후 css/tabs.css 로 분리 예정.
   ═══════════════════════════════════════════════════════════════ */
.woos-tabs {
  display: flex;
  gap: 4px;
  margin: 12px 12px 10px;
  padding: 4px;
  background: rgba(8, 16, 28, .58);
  border: 1px solid rgba(36, 61, 87, .8);
  border-radius: 12px;
}
.woos-tab {
  flex: 1;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: 1px;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  transition: all .15s ease;
  padding: 4px 8px;
  line-height: 1.1;
}
.woos-tab:hover { color: var(--text-secondary); background: rgba(0, 212, 255, .04); }
.woos-tab.active {
  color: var(--accent-cyan);
  background: rgba(0, 212, 255, .12);
  border: 1px solid rgba(0, 212, 255, .35);
}
.woos-tab-badge {
  font-size: .58rem;
  padding: 1px 5px;
  border-radius: 999px;
  background: rgba(0, 212, 255, .15);
  color: var(--accent-cyan);
  letter-spacing: .3px;
}
/* 탭 콘텐츠 영역 */
.woos-tab-panel { display: none; padding: 0 12px; }
.woos-tab-panel.active { display: block; animation: tabFade .2s ease-out; padding: 0 12px; }
@keyframes tabFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 380px) {
  .woos-tab { font-size: .62rem; min-height: 36px; }
}
/* [END MODULE: phase22_tabs_css] */

/* ═══════════════════════════════════════════════════════════════
   [MODULE: phase22_outcome_css] — 24H Outcome 탭 스타일
   향후 css/outcome_dashboard.css 로 분리 예정.
   ═══════════════════════════════════════════════════════════════ */
.outcome-disclaimer {
  position: sticky;
  top: 0;
  z-index: 10;
  margin: 0 0 10px;
  padding: 9px 12px;
  background: linear-gradient(90deg, rgba(251,191,36,.14), rgba(251,191,36,.06));
  border: 1px solid rgba(251,191,36,.4);
  border-radius: 10px;
  font-family: var(--mono);
  font-size: .62rem;
  line-height: 1.5;
  color: #fbbf24;
  letter-spacing: .3px;
}
.outcome-refresh-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}
.outcome-refresh-btn {
  padding: 6px 11px;
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--accent-cyan);
  background: rgba(0,212,255,.08);
  border: 1px solid rgba(0,212,255,.3);
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
}
.outcome-refresh-btn:active { transform: scale(.97); }
.outcome-meta-text {
  font-family: var(--mono);
  font-size: .58rem;
  color: var(--text-muted);
  letter-spacing: .5px;
}

/* 요약 KPI 4카드 */
.outcome-kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}
.outcome-kpi {
  padding: 10px 6px;
  background: linear-gradient(180deg, rgba(17,30,46,.9), rgba(12,20,32,.92));
  border: 1px solid rgba(36,61,87,.9);
  border-radius: 10px;
  text-align: center;
}
.outcome-kpi-label {
  font-family: var(--mono);
  font-size: .56rem;
  color: var(--text-muted);
  letter-spacing: .8px;
  margin-bottom: 4px;
}
.outcome-kpi-value {
  font-family: var(--mono);
  font-size: 1.25rem;
  font-weight: 800;
  color: #f6fbff;
  line-height: 1.1;
}
.outcome-kpi.success .outcome-kpi-value { color: #4ade80; }
.outcome-kpi.warn .outcome-kpi-value { color: #fbbf24; }
.outcome-kpi.rate .outcome-kpi-value { color: #7dd3fc; }

/* 결과 분포 가로 막대 */
.outcome-dist {
  padding: 10px 12px;
  background: rgba(8,16,28,.54);
  border: 1px solid rgba(36,61,87,.8);
  border-radius: 10px;
  margin-bottom: 10px;
}
.outcome-dist-title {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text-secondary);
  letter-spacing: 1.2px;
  margin-bottom: 8px;
}
.outcome-dist-bar {
  display: flex;
  height: 18px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(0,0,0,.4);
}
.outcome-dist-seg {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: .55rem;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  transition: flex .3s ease;
}
.outcome-dist-seg.success { background: #16a34a; }
.outcome-dist-seg.watch { background: #ca8a04; }
.outcome-dist-seg.flat { background: #475569; }
.outcome-dist-seg.fail { background: #dc2626; }
.outcome-dist-legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 8px;
  font-family: var(--mono);
  font-size: .55rem;
}
.outcome-dist-legend span b { color: #fff; }

/* 단위 토글 (알람/코인) */
.outcome-unit-toggle {
  display: flex;
  gap: 4px;
  background: rgba(8,16,28,.6);
  border: 1px solid rgba(36,61,87,.7);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 10px;
}
.outcome-unit-btn {
  flex: 1;
  padding: 7px 4px;
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.outcome-unit-btn.active {
  background: rgba(0,212,255,.12);
  color: var(--accent-cyan);
}

/* 거래소/등급 섹션 공통 */
.outcome-section {
  padding: 10px 12px;
  background: rgba(8,16,28,.5);
  border: 1px solid rgba(36,61,87,.8);
  border-radius: 10px;
  margin-bottom: 10px;
}
.outcome-section-title {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text-secondary);
  letter-spacing: 1.2px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.outcome-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px dashed rgba(36,61,87,.5);
  font-family: var(--mono);
  font-size: .64rem;
}
.outcome-row:last-child { border-bottom: none; }
.outcome-row-label {
  min-width: 60px;
  font-weight: 700;
  color: var(--text-secondary);
}
.outcome-row-bar {
  flex: 1;
  display: flex;
  height: 14px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(0,0,0,.35);
}
.outcome-row-bar > div { transition: flex .3s; }
.outcome-row-stats {
  font-size: .58rem;
  color: var(--text-muted);
  min-width: 74px;
  text-align: right;
}

/* 등급 진화 SVG 카드 */
.grade-evo-card {
  padding: 8px 10px 6px;
  background: rgba(8,16,28,.6);
  border: 1px solid rgba(36,61,87,.75);
  border-radius: 10px;
  margin-bottom: 6px;
}
.grade-evo-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  font-family: var(--mono);
  font-size: .6rem;
}
.grade-evo-coin { font-weight: 800; color: #f6fbff; letter-spacing: .5px; }
.grade-evo-peak { color: var(--accent-cyan); }
.grade-evo-result {
  font-size: .56rem;
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: .3px;
}
.grade-evo-result.success { background: rgba(22,163,74,.18); color: #4ade80; border: 1px solid rgba(22,163,74,.4); }
.grade-evo-result.watch { background: rgba(202,138,4,.18); color: #fbbf24; border: 1px solid rgba(202,138,4,.4); }
.grade-evo-result.flat { background: rgba(71,85,105,.22); color: #94a3b8; border: 1px solid rgba(71,85,105,.5); }
.grade-evo-result.fail { background: rgba(220,38,38,.18); color: #f87171; border: 1px solid rgba(220,38,38,.4); }
.grade-evo-result.orphaned { background: rgba(100,100,100,.14); color: #6b7280; border: 1px solid rgba(100,100,100,.4); }
.grade-evo-svg { width: 100%; height: auto; display: block; }

/* 최근 outcome 카드 */
.recent-outcome-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 8px;
  padding: 8px 10px;
  background: rgba(8,16,28,.52);
  border: 1px solid rgba(36,61,87,.7);
  border-radius: 10px;
  margin-bottom: 5px;
  align-items: center;
  font-family: var(--mono);
  font-size: .62rem;
}
.recent-outcome-card .ro-grade {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 800;
}
.recent-outcome-card .ro-main { overflow: hidden; }
.recent-outcome-card .ro-coin { font-weight: 800; color: #f6fbff; font-size: .72rem; }
.recent-outcome-card .ro-meta { font-size: .55rem; color: var(--text-muted); margin-top: 2px; }
.recent-outcome-card .ro-right { text-align: right; }
.recent-outcome-card .ro-rise { font-weight: 800; font-size: .82rem; }
.recent-outcome-card .ro-rise.pos { color: #4ade80; }
.recent-outcome-card .ro-rise.neg { color: #f87171; }
.recent-outcome-card .ro-rt {
  font-size: .52rem;
  padding: 1px 5px;
  border-radius: 999px;
  letter-spacing: .3px;
  display: inline-block;
  margin-top: 2px;
}

/* 로딩/에러 상태 */
.outcome-loading,
.outcome-error,
.outcome-empty {
  text-align: center;
  padding: 28px 14px;
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--text-muted);
  background: rgba(8,16,28,.5);
  border: 1px dashed rgba(36,61,87,.6);
  border-radius: 10px;
  margin: 12px 0;
}
.outcome-error { color: #f87171; border-color: rgba(248,113,113,.4); }

@media (max-width: 380px) {
  .outcome-kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .outcome-kpi-value { font-size: 1.1rem; }
}

/* [Phase 4.7 공사 4] 로딩 스피너 — woos_roding.png + 페이드 글로우 + "로딩 중" 시안 흐름
 * 사용자 결정 (그룹 1):
 *   - 이미지: assets/loading-logo.png (회전 X)
 *   - 글로우 페이드 인/아웃: 1.5초/회, 투명도 30~100%
 *   - "로딩 중" 글자: 시안 그라데이션 좌→우 흐름, 2초/회, 20px
 *   - 이미지-글자 간격: 20px
 *   - 위치: 화면 정중앙
 *   - 응답 빠르면 짧게 표시 (깜빡임 OK, 사용자 결정 P8)
 */
.woos-loading-spinner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  min-height: 200px;
}
.woos-loading-spinner-img {
  width: clamp(170px, 30vw, 260px);
  height: auto;
  display: block;
  animation: woos-loading-glow 1.5s ease-in-out infinite;
}
.woos-loading-spinner-text {
  margin-top: 20px;
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, 
    rgba(125,211,252,0.3) 0%, 
    rgba(125,211,252,1) 50%, 
    rgba(125,211,252,0.3) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: woos-loading-text-flow 2s linear infinite;
}
@keyframes woos-loading-glow {
  0%   { opacity: 0.3; filter: drop-shadow(0 0 4px rgba(125,211,252,0.3)); }
  50%  { opacity: 1.0; filter: drop-shadow(0 0 16px rgba(125,211,252,0.8)); }
  100% { opacity: 0.3; filter: drop-shadow(0 0 4px rgba(125,211,252,0.3)); }
}
@keyframes woos-loading-text-flow {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.analyzer-card svg {
  display: block;
  margin: 8px auto;
  background: var(--bg-panel);
  border-radius: 6px;
}
.analyzer-card .threshold-row {
  margin: 6px 0 6px 8px;
  font-family: var(--mono);
  font-size: 12px;
}
.analyzer-card .threshold-row span {
  margin-right: 10px;
}
.analyzer-card .threshold-row .reached  { color: var(--text-primary); }
.analyzer-card .threshold-row .pending  { color: var(--text-muted); }
@media (max-width: 600px) {
  .analyzer-card .summary-row { font-size: 12px; padding: 6px; }
  .analyzer-section-title { font-size: .68rem; }
}

/* ── TASK-3-A: 알람 테이블 ────────────────────────── */

.analyzer-progress-card .summary-row {

  padding: 6px;

}

/* [Phase 3.6] 컴팩트 모드 — details 기반 한 줄 요약 */
details.analyzer-progress-card {
  padding: 0;
  margin: 4px 0;
  background: var(--bg-card);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 6px;
  overflow: hidden;
}

details.analyzer-progress-card > summary.progress-compact-summary {
  list-style: none;
  cursor: pointer;
  padding: 8px 12px;
  font-size: 12px;
  font-family: var(--mono);

  align-items: center;

  flex-wrap: wrap;

}

  content: '▼';
  margin-left: auto;
  font-size: 9px;
  color: var(--text-muted);

.analyzer-progress-card .tier-mini {

  font-weight: 700;

}

.analyzer-progress-card .progress-detail-body {

}

/* Phase 3.5 의 내부 progress-* 요소들은 progress-detail-body 안에서 그대로 사용 */

/* ════════════════ [Phase 4.0] WOOS_ANALYZER Realtime Graph CSS ════════════════ */
/* dot 색상 — 기존 .coin-dot 와 호환 (.coin-dot.woos-dot-XXX 같이 사용) */
.coin-dot.woos-dot-cyan,
.woos-dot-cyan { background: #00d4ff !important; box-shadow: 0 0 8px #00d4ff; animation: woos-pulse-slow 2.5s infinite; }
.coin-dot.woos-dot-green,
.woos-dot-green { background: #00e676 !important; box-shadow: 0 0 8px #00e676; animation: woos-pulse-fast 1.2s infinite; }
.coin-dot.woos-dot-orange,
.woos-dot-orange { background: #ff7849 !important; box-shadow: 0 0 8px #ff7849; animation: woos-pulse-urgent 0.7s infinite; }
.coin-dot.woos-dot-gray,
.woos-dot-gray { background: #4b5563 !important; box-shadow: none; animation: none; }
@keyframes woos-pulse-slow { 0%, 100% { opacity: 1 } 50% { opacity: 0.4 } }
@keyframes woos-pulse-fast { 0%, 100% { opacity: 1 } 50% { opacity: 0.45 } }
@keyframes woos-pulse-urgent { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }

/* 변화율 */
.woos-pct { font-weight: 700; font-size: 0.85rem; margin-right: 8px; }

.woos-pct-down { color: #ff4560; }

/* 펼친 본문 — 기존 progress-rich-body 안에 들어가는 새 영역 */

.woos-pseudo-mark { display: inline-block; color: #fbbf24; font-size: 0.7rem; margin-bottom: 8px; }

/* 진행률 (펼친 본문 내) */
.woos-body .woos-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.woos-body .woos-progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }

.woos-body .woos-progress-pct { font-size: 0.78rem; color: #9ca3af; min-width: 36px; text-align: right; }

/* 3축 지표 */
.woos-metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
.woos-metrics-row.woos-empty { display: block; padding: 10px; text-align: center; color: #6b7280; font-style: italic; background: rgba(255,255,255,0.02); border-radius: 8px; }
.woos-metric { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px 6px; text-align: center; }
.woos-metric-label { font-size: 0.7rem; color: #6b7280; margin-bottom: 4px; }
.woos-metric-value { font-size: 0.82rem; color: #e5e7eb; font-weight: 600; }

/* 현재가 강조 */

.woos-current-up   { color: #00e676; }
.woos-current-down { color: #ff4560; }
.woos-current-big.woos-empty { color: #6b7280; font-weight: 400; font-size: 0.9rem; font-style: italic; }

/* SVG 차트 영역 (모바일 100% / 데스크톱 max-width 480px) */
.woos-graph-wrap { width: 100%; max-width: 480px; margin: 12px auto; }

/* 전략 A/B */
.woos-strategies { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.woos-strategy { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px 12px; }

}

.hdr-label-new {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 999px;
  font-size: 0.66rem; font-weight: 850;

}

.woos-score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.78rem; }
.woos-score-label { color: #e5e7eb; font-weight: 600; }
.woos-score-value { font-weight: 700; }
.woos-score-pos .woos-score-value { color: #00e676; }
.woos-score-neg .woos-score-value { color: #ff4560; }
.woos-score-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.woos-score-bar-fill { height: 100%; border-radius: 2px; }
.woos-score-pos .woos-score-bar-fill { background: linear-gradient(90deg, #00d4ff, #00e676); }
.woos-score-neg .woos-score-bar-fill { background: linear-gradient(90deg, #ff7849, #ff4560); }
.woos-score-strengths, .woos-score-weaknesses { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.06); }
.woos-score-section-title { font-size: 0.72rem; color: #9ca3af; font-weight: 700; margin-bottom: 4px; }
.woos-score-strengths .woos-score-section-title { color: #00e676; }
.woos-score-weaknesses .woos-score-section-title { color: #ff7849; }
.woos-score-viz ul { margin: 0; padding-left: 20px; }
.woos-score-viz li { font-size: 0.78rem; color: #e5e7eb; line-height: 1.55; padding: 1px 0; }
.woos-score-conclusion { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.06); font-size: 0.85rem; color: #e5e7eb; line-height: 1.5; font-weight: 500; font-style: italic; text-align: center; }
/* ════════════════════════════════════════════════════════════════ */

/* ════════════════════ [Phase 4.3] 추가 CSS ════════════════════ */
/* 3축 컬러 (시안 톤) — 한글 우선 + 영문 부제 */
.woos-metric-en { font-size: 0.6rem; color: #6b7280; font-weight: 400; margin-left: 4px; }
.woos-metric-speed .woos-metric-value { color: #00d4ff; }
.woos-metric-stability .woos-metric-value { color: #ff7849; }
.woos-metric-opportunity .woos-metric-value { color: #00e676; }

/* 현재가 시안 톤 강화 (큰 폰트) */
.woos-current-big { font-size: 1.6rem; }
.woos-current-up   { color: #00e676; text-shadow: 0 0 12px rgba(0, 230, 118, 0.4); }
.woos-current-down { color: #ff4560; text-shadow: 0 0 12px rgba(255, 69, 96, 0.4); }

/* 도달 타임라인 */
.woos-timeline { margin: 12px auto; max-width: 480px; padding: 12px 8px; position: relative; }
.woos-tl-line { position: absolute; top: 22px; left: 8%; right: 8%; height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; z-index: 0; }
/* [Phase 4.7 공사 4 — 3-2] 도달 타임라인 헤더 (ⓘ 추가) */
.woos-timeline-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  font-size: 12px;
  color: #94a3b8;
  font-weight: 600;
}
.woos-tl-items { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 1; }
.woos-tl-item { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 0; }
.woos-tl-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.15); margin-bottom: 6px; transition: all 0.3s; }
.woos-tl-dot-reached { background: #00d4ff; box-shadow: 0 0 6px #00d4ff; }
.woos-tl-dot-pending { background: rgba(255,255,255,0.15); }
.woos-tl-label { font-size: 0.65rem; color: #9ca3af; text-align: center; line-height: 1.2; margin-bottom: 2px; }
.woos-tl-time { font-size: 0.7rem; color: #e5e7eb; font-weight: 600; }

/* 스캐너 채점표 */
.woos-scoring { margin: 14px 0; padding: 14px; background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(124,58,237,0.05)); border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; }
.woos-scoring-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.woos-scoring-title { font-size: 0.85rem; font-weight: 700; color: #e5e7eb; }
.woos-scoring-status { font-size: 0.65rem; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
.woos-status-provisional { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
.woos-status-confirmed { background: rgba(0, 230, 118, 0.15); color: #00e676; }
.woos-scoring-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.woos-scoring-progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.woos-scoring-progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00e676); border-radius: 2px; }
.woos-scoring-progress-label { font-size: 0.7rem; color: #9ca3af; min-width: 70px; text-align: right; }

.woos-scoring-axes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.woos-axis { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 8px 6px; text-align: center; }
.woos-axis-title { font-size: 0.7rem; color: #9ca3af; margin-bottom: 4px; font-weight: 600; }
.woos-axis-en { font-size: 0.55rem; color: #6b7280; font-weight: 400; }
.woos-axis-value { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
.woos-axis-detail { font-size: 0.65rem; color: #9ca3af; }
.woos-axis-speed .woos-axis-value { color: #00d4ff; }
.woos-axis-stability .woos-axis-value { color: #ff7849; }
.woos-axis-opportunity .woos-axis-value { color: #00e676; }

.woos-scoring-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; padding: 8px 0; border-top: 1px dashed rgba(255,255,255,0.06); border-bottom: 1px dashed rgba(255,255,255,0.06); }
.woos-scoring-pattern { font-size: 0.78rem; color: #c4b5fd; }
.woos-scoring-pattern b { color: #e5e7eb; }
.woos-scoring-numbers { font-size: 0.78rem; color: #9ca3af; }
.woos-scoring-numbers b { color: #00d4ff; }

.woos-scoring-assessment { font-size: 0.85rem; color: #e5e7eb; line-height: 1.5; padding: 8px 4px; font-weight: 500; text-align: center; font-style: italic; }
.woos-scoring.woos-empty { padding: 16px; text-align: center; color: #6b7280; font-style: italic; }
/* ════════════════════════════════════════════════════════════════ */

/* ════════════════════ [Phase 4.2] 추가 CSS ════════════════════ */
/* liveTier flow (그룹 카드의 시계열) */
.woos-flow-label { color: #6b7280; font-weight: 600; margin-right: 4px; font-size: 0.7rem; }
.woos-group-flow.woos-group-flow-live { color: #00e676; margin-top: 2px; }
.woos-group-flow.woos-group-flow-live .woos-flow-label { color: #6b7280; }
/* 미니 카드의 liveTier 화살표 표시 */
.woos-mini-card .woos-mini-grade { font-size: 0.65rem; padding: 1px 5px; min-width: 28px; text-align: center; }
/* ════════════════════════════════════════════════════════════════ */

/* ════════════════════ [Phase 4.1] 추가 CSS ════════════════════ */
/* liveTier 화살표 (B → A) */
.tier-pill.woos-live-tier { background: linear-gradient(90deg, rgba(37, 99, 235, 0.2), rgba(0, 230, 118, 0.25)); color: #c4f4d9; font-weight: 700; letter-spacing: 0.3px; }

/* 펼친 헤더 — 스캐너 / 현재 분리 표시 (E2 권장) */
.woos-tier-header { display: flex; align-items: center; gap: 10px; padding: 6px 0 10px; font-size: 0.78rem; color: #9ca3af; border-bottom: 1px dashed rgba(255,255,255,0.06); margin-bottom: 10px; }
.woos-tier-header b { color: #e5e7eb; font-weight: 700; }
.woos-tier-header .woos-tier-scanner b { color: #93c5fd; }
.woos-tier-header .woos-tier-live b { color: #00e676; }
.woos-tier-sep { color: #4b5563; }

/* 신호 근거 블록 */
.woos-reason { margin: 12px 0; padding: 10px 12px; background: rgba(0, 212, 255, 0.04); border-left: 2px solid rgba(0, 212, 255, 0.5); border-radius: 6px; }
.woos-reason-title { font-size: 0.72rem; color: #7dd3fc; font-weight: 700; margin-bottom: 6px; }
.woos-reason-row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; font-size: 0.78rem; }
.woos-reason-label { color: #9ca3af; min-width: 36px; flex-shrink: 0; font-weight: 600; }
.woos-reason-body { color: #e5e7eb; flex: 1; word-break: keep-all; }
.woos-reason-body.woos-empty { color: #6b7280; font-style: italic; }
.woos-reason-tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.woos-reason-tag { padding: 2px 8px; background: rgba(124, 58, 237, 0.15); color: #c4b5fd; border-radius: 10px; font-size: 0.7rem; }

/* 세력 판단 블록 */
.woos-force { margin: 12px 0; padding: 10px 12px; background: rgba(124, 58, 237, 0.04); border-left: 2px solid rgba(124, 58, 237, 0.5); border-radius: 6px; }
.woos-force-title { font-size: 0.72rem; color: #c4b5fd; font-weight: 700; margin-bottom: 6px; }
.woos-force-row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; font-size: 0.78rem; }
.woos-force-label { color: #9ca3af; min-width: 36px; flex-shrink: 0; font-weight: 600; }
.woos-force-body { color: #e5e7eb; flex: 1; }
.woos-force-body.woos-empty { color: #6b7280; font-style: italic; }
/* ════════════════════════════════════════════════════════════════ */

/* ────────────── Phase 3.7: 추적 카드 풍부한 디자인 ────────────── */
details.progress-rich-card {
  margin: 8px 0;
  padding: 0;
  background: var(--bg-card);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color .15s;
}
details.progress-rich-card[data-tier="A"] { border-left: 3px solid #7c3aed; }
details.progress-rich-card[data-tier="B"] { border-left: 3px solid #2563eb; }
details.progress-rich-card[data-tier="C"] { border-left: 3px solid #6b7280; }
details.progress-rich-card[open] { border-color: rgba(0, 212, 255, 0.5); }

details.progress-rich-card > summary.progress-compact-summary {
  list-style: none;
  cursor: pointer;
  padding: 12px 14px 0;
  display: block;
  user-select: none;
  font-size: 13px;
  color: var(--text-primary);
  transition: background .12s;
  position: relative;
  overflow: hidden;
}

/* [Phase 3.8] 닫힌 카드 배경 진행률 (사진의 ZAMA 스타일) */
.compact-bg-progress {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  background: linear-gradient(90deg, rgba(0,212,255,0.08), rgba(0,230,118,0.10));
  pointer-events: none;
  transition: width .3s ease;
  z-index: 0;
}
.compact-content {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 10px;
}

/* [Phase 3.8] 얇은 진행률 바 (카드 하단) */
.compact-bar-thin {
  position: relative;
  height: 4px;
  background: rgba(255, 255, 255, 0.06);
  margin: 0 -14px;
  overflow: hidden;
  z-index: 1;
}
.compact-bar-thin-fill {
  height: 100%;
  /* [Phase 4.7.11 R11-5] 진행도 바 기본 — 시안 → 민트 그라디언트 */
  background: linear-gradient(90deg, #00dfff, #00e6a8);
  box-shadow: 0 0 13px rgba(0, 229, 255, 0.45);
  transition: width .3s ease;
}

/* [Phase 4.7.11 R11-5] 관심 코인 진행률 바 — 시안 → 민트 (사용자 결정: 시안 외곽 통일) */
.compact-bar-thin-fill.is-watch {
  background: linear-gradient(90deg, #00dfff, #00e6a8);
  box-shadow: 0 0 13px rgba(0, 229, 255, 0.45);
}

/* [Phase 4.7.11 R11-5] 정밀 카드 진행률 바 — 파랑 → 보라 그라디언트 */
details.v477-track-card.is-deep:not(.is-watch) .compact-bar-thin-fill {
  background: linear-gradient(90deg, #268dff, #7b5cff);
  box-shadow: 0 0 13px rgba(123, 92, 255, 0.38);
}

/* ══════════════════════════════════════════
   [Phase 4.7.8 R6-B] 카드 헤더 글래스 + 네온 UI
   - .v477-track-card: 카드 외곽 글래스 효과
   - .is-watch: 관심 코인 (노랑 보더 + 글로우)
   - .is-deep: 정밀(관심X) (보라 보더 + 글로우)
   - 기본: 시안 미세 보더
══════════════════════════════════════════ */
details.v477-track-card {
  position: relative;
  border-radius: 14px;
  background:
    linear-gradient(135deg, rgba(0, 229, 255, 0.05), rgba(120, 68, 255, 0.04)),
    rgba(8, 16, 32, 0.42);
  border: 1px solid rgba(0, 229, 255, 0.14);
  box-shadow:
    0 4px 18px rgba(0, 0, 0, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(12px) saturate(130%);
  -webkit-backdrop-filter: blur(12px) saturate(130%);
  margin-bottom: 8px;
  overflow: hidden;
  transition: box-shadow .18s, border-color .18s;
}

details.v477-track-card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 0% 20%, rgba(0, 229, 255, 0.10), transparent 38%),
    radial-gradient(circle at 100% 0%, rgba(155, 92, 255, 0.08), transparent 40%);
  opacity: 0.7;
  z-index: 0;
}

details.v477-track-card > summary,
details.v477-track-card > .progress-rich-body {
  position: relative;
  z-index: 1;
}

/* [Phase 4.7.11 R11-1] 관심 코인 — 시안 보더 + 시안 glow (사용자 결정 — 사진 의도)
   별만 노랑 강조 (별도 .v478-star.is-on 클래스로 처리) */
details.v477-track-card.is-watch {
  border-color: rgba(0, 229, 255, 0.62);
  background:
    radial-gradient(circle at 0% 28%, rgba(0, 229, 255, 0.30), transparent 40%),
    linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(10, 18, 36, 0.72));
  box-shadow:
    0 0 0 1px rgba(0, 229, 255, 0.28),
    0 0 30px rgba(0, 229, 255, 0.28),
    0 12px 34px rgba(0, 0, 0, 0.46),
    inset 0 1px 0 rgba(255, 255, 255, 0.12);
}

/* [Phase 4.7.11 R11-1] 정밀(관심X) — 보라 보더 + 보라/시안 glow */
details.v477-track-card.is-deep:not(.is-watch) {
  border-color: rgba(123, 92, 255, 0.62);
  background:
    radial-gradient(circle at 0% 24%, rgba(123, 92, 255, 0.20), transparent 38%),
    linear-gradient(135deg, rgba(24, 14, 48, 0.82), rgba(10, 12, 30, 0.75));
  box-shadow:
    0 0 0 1px rgba(123, 92, 255, 0.28),
    0 0 26px rgba(123, 92, 255, 0.28),
    0 12px 34px rgba(0, 0, 0, 0.44),
    inset 0 1px 0 rgba(255, 255, 255, 0.10);
}

details.v477-track-card.is-deep:not(.is-watch)::before {
  background:
    radial-gradient(circle at 0% 20%, rgba(123, 92, 255, 0.14), transparent 36%),
    radial-gradient(circle at 100% 0%, rgba(0, 229, 255, 0.08), transparent 40%);
}

/* hover 강화 (PC) */
@media (hover: hover) {
  details.v477-track-card:hover {
    border-color: rgba(0, 229, 255, 0.40);
  }
  details.v477-track-card.is-watch:hover {
    box-shadow:
      0 0 0 1px rgba(0, 229, 255, 0.40),
      0 0 36px rgba(0, 229, 255, 0.36),
      0 14px 38px rgba(0, 0, 0, 0.50);
  }
  details.v477-track-card.is-deep:not(.is-watch):hover {
    box-shadow:
      0 0 0 1px rgba(123, 92, 255, 0.40),
      0 0 32px rgba(123, 92, 255, 0.36),
      0 12px 32px rgba(0, 0, 0, 0.46);
  }
}

/* [Phase 4.7 공사 4 — 1-1] "5분 전 데이터" 라벨 (헤더 작게) */
.woos-sample-age {
  display: inline-block;
  font-size: 10px;
  color: #6b7280;
  margin-left: 6px;
  font-weight: 400;
  font-style: italic;
}

/* [Phase 4.7 공사 4 — 1-3 / Phase 4.7.11 R11-7] 잔여 시간 — 골드 #ffd233 (사용자 결정) */
.woos-remaining-time {
  display: inline-block;
  font-size: 11px;
  color: #ffd233;
  margin-left: 6px;
  font-weight: 800;
  text-shadow: 0 0 4px rgba(255, 210, 51, 0.45);
}
.woos-remaining-time.woos-remaining-expired {
  color: #ef4444;
  text-shadow: 0 0 4px rgba(239, 68, 68, 0.4);
}

/* ══════════════════════════════════════════
   [Phase 4.7.10 R10-1] 카드 헤더 다중 줄 구조 (사용자 결정 — 사진 의도)
   - .v477-card-content: 좌측 + 우측 flex
   - .v477-card-left/right: column 정렬
   - .v477-card-row1/2/3: 각 행 spacing
   ══════════════════════════════════════════ */
.v477-card-content {
  display: flex;
  align-items: stretch;
  gap: 10px;
  padding: 8px 10px;
  position: relative;
  z-index: 1;
}
.v477-card-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1 1 auto;
  min-width: 0;
}
.v477-card-right {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
  flex: 0 0 auto;
  min-width: 110px;
}
.v477-card-left .v477-card-row1,
.v477-card-right .v477-card-row1 {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: nowrap;
}
.v477-card-left .v477-card-row2,
.v477-card-right .v477-card-row2 {
  display: flex;
  align-items: center;
  gap: 6px;
}
.v477-card-right .v477-card-row3 {
  width: 100%;
  margin-top: 2px;
}
.v477-card-right .v477-card-row1 .progress-text {
  font-size: 11px;
  font-weight: 600;
  color: #cbd5e1;
}
.v477-card-right .v477-progress-bar {
  width: 100%;
  height: 3px;
}
/* R10-1 — 다중 줄 구조에서 sample age + remaining time 정렬 */
.v477-card-right .v477-card-row2 .woos-sample-age,
.v477-card-right .v477-card-row2 .woos-remaining-time {
  margin-left: 0;
}

/* [Phase 4.7 공사 4 — 2-3] 가격 변화량 표시 (헤더) */
.woos-price-delta {
  display: inline-block;
  font-size: 12px;
  margin-right: 6px;
  font-weight: 600;
  font-family: var(--mono);
}
.woos-price-delta-up { color: #22c55e; }
.woos-price-delta-down { color: #ef4444; }

/* [Phase 4.7 공사 4 — 2-7] 자동 정밀 라벨 (헤더 작게, 회색) */
.woos-auto-precise-label {
  display: inline-block;
  font-size: 10px;
  color: #94a3b8;
  margin-left: 4px;
  font-weight: 400;
  font-style: italic;
  opacity: 0.85;
}

/* [Phase 4.7 공사 4 — 2-8] 모달 컴포넌트 (재사용 — 한도 알림 / 관심 OFF / ⓘ 정의)
 * 사용자 결정 (P7=A): 같은 디자인 재사용
 * z-index 10100 (기존 최대 10001 위)
 */
.woos-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 10100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: woos-modal-fade-in 0.2s ease-out;
}
@keyframes woos-modal-fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
.woos-modal-box {
  background: linear-gradient(180deg, #1a1f2e, #0f1420);
  border: 1px solid var(--accent-cyan);
  border-radius: 12px;
  padding: 20px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),

  50%      { box-shadow: 0 0 16px rgba(255, 140, 66, 1); transform: scale(1.25); }
}

.coin-dot.dot-cyan {

}

.progress-summary-right {
