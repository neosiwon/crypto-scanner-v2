<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WOOS Scanner V3</title><style>:root{--bg:#080d13;--card:#0f1a27;--line:#1a2d42;--line2:#243d57;--cy:#00d4ff;--g:#00e676;--o:#ff8c42;--r:#ff4560;--y:#ffd600;--t:#e2eaf5;--s:#7a9ab8;--m:#3d5a72;--gl:0 0 14px rgba(0,212,255,.35)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:'Noto Sans KR',system-ui,sans-serif}.app{max-width:560px;margin:auto;padding:12px}.hero,.card{background:linear-gradient(180deg,rgba(0,212,255,.05),rgba(15,26,39,.96));border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}.hero{border-color:rgba(0,212,255,.3);box-shadow:0 0 26px rgba(0,212,255,.12)}h1{margin:0;color:var(--cy);font-size:20px;text-shadow:var(--gl)}.sub,.hint,.stat{font-size:12px;color:var(--s);line-height:1.5}.badges,.exs,.chips{display:flex;gap:6px;flex-wrap:wrap}.badge,.chip{border:1px solid var(--line2);border-radius:999px;padding:3px 9px;font-size:11px;font-weight:800;color:var(--s);background:#0c1420}.cyan{color:var(--cy);border-color:rgba(0,212,255,.42);background:rgba(0,212,255,.08)}.green{color:var(--g);border-color:rgba(0,230,118,.35);background:rgba(0,230,118,.07)}.yellow{color:var(--y);border-color:rgba(255,214,0,.35);background:rgba(255,214,0,.06)}.orange{color:var(--o);border-color:rgba(255,140,66,.35);background:rgba(255,140,66,.08)}.red{color:var(--r);border-color:rgba(255,69,96,.35);background:rgba(255,69,96,.08)}button,select,input,textarea{border:1px solid var(--line2);border-radius:10px;background:#0c1420;color:var(--t);padding:10px;font-weight:800}button{cursor:pointer}.active{outline:1px solid var(--cy);box-shadow:var(--gl)}.primary{width:100%;min-height:54px;font-size:16px;color:var(--cy);border-color:var(--cy);background:rgba(0,212,255,.09);box-shadow:var(--gl)}.ex{flex:1;min-width:94px}.main{color:#ff7849;border-color:rgba(244,102,90,.45);background:rgba(244,102,90,.12)}.subex{color:#5da9ff;border-color:rgba(0,95,255,.4);background:rgba(0,95,255,.12)}.ref{color:#f0b90b;border-color:rgba(240,185,11,.4);background:rgba(240,185,11,.1)}textarea{width:100%;min-height:96px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.box{background:#111e2e;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}.num{font:800 20px ui-monospace;color:var(--cy)}.lbl{font-size:11px;color:var(--s)}.tools{display:grid;grid-template-columns:1fr 110px;gap:8px;margin-top:10px}.result{border:1px solid var(--line);border-left:4px solid var(--cy);border-radius:15px;background:linear-gradient(180deg,rgba(0,212,255,.04),var(--card));overflow:hidden;margin:10px 0}.rh{display:flex;align-items:center;gap:8px;padding:12px 12px 6px}.dot{width:8px;height:8px;border-radius:99px;background:var(--cy);box-shadow:var(--gl)}.coin{font:800 15px ui-monospace}.score{margin-left:auto;color:var(--cy);font:800 18px ui-monospace}.bar{height:5px;background:#0c1420;border-radius:99px;overflow:hidden;margin:4px 12px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cy),var(--g));box-shadow:var(--gl)}.meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--m);font:11px ui-monospace;padding:4px 12px 10px}.open{width:100%;border:0;border-top:1px solid var(--line);border-radius:0;background:#0c1420;color:var(--s)}.body{display:none;background:#111e2e;border-top:1px solid var(--line);padding:10px 12px}.result.on .body{display:block}.sec{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:10px;margin:8px 0}.sec h3{color:var(--cy);font-size:12px;margin:0 0 6px}.sec p{font-size:12px;line-height:1.6;margin:0}.empty{border:1px dashed var(--line2);border-radius:14px;padding:20px;text-align:center;color:var(--s)}@media(max-width:430px){.tools{grid-template-columns:1fr}.ex{min-width:0}}</style></head><body><div class="app"><section class="hero"><h1>WOOS Scanner V3</h1><p class="sub">빗썸 메인 기준의 후보 스캐너입니다. 현재는 실사용 검증 단계입니다.</p><div class="badges"><span class="badge cyan">준비</span><span class="badge green">수동 운영</span><span class="badge yellow">개발 개방 모드</span></div></section><section class="card"><b style="color:var(--cy)">스캔 컨트롤</b><p class="sub"><strong style="color:#ff7849">메인 거래소: 빗썸</strong> · 업비트 보조 검증 · 바이낸스 참고</p><div class="exs"><button class="ex main active" data-ex="bithumb">빗썸<br><span class="hint">메인</span></button><button class="ex subex" data-ex="upbit">업비트<br><span class="hint">보조</span></button><button class="ex ref" data-ex="binance">바이낸스<br><span class="hint">참고</span></button></div><p id="notice" class="hint">빗썸 본선 기준으로 스캔합니다. 결과가 부족하면 업비트 보조 검증을 선택하세요.</p><button id="scan" class="primary">스캔 시작</button><details><summary style="color:var(--cy);font-weight:800">고급 설정</summary><p><select id="tf"><option value="5m">5분봉</option><option value="15m">15분봉</option><option value="1h">1시간봉</option></select></p><p><input id="limit" value="60"></p><p><textarea id="markets"></textarea></p></details></section><section class="card"><div class="grid"><div class="box"><div id="nTotal" class="num">0</div><div class="lbl">전체</div></div><div class="box"><div id="nOk" class="num">0</div><div class="lbl">정상</div></div><div class="box"><div id="nCand" class="num">0</div><div class="lbl">후보</div></div><div class="box"><div id="nWatch" class="num">0</div><div class="lbl">관찰</div></div><div class="box"><div id="nLow" class="num">0</div><div class="lbl">신호 약함</div></div><div class="box"><div id="nFail" class="num">0</div><div class="lbl">실패</div></div></div><div class="tools"><input id="q" placeholder="코인명 검색"><select id="sort"><option value="score">점수순</option><option value="latest">최신순</option></select></div></section><section class="card"><b style="color:var(--cy)">후보 카드</b> <span id="stat" class="stat">스캔 대기 중</span><div id="results" class="empty">스캔을 시작하면 후보 카드가 여기에 표시됩니다.</div></section></div><script>(function(){var API='https://ws3-telegram-canary.neosiwon.workers.dev',S={ex:'bithumb',rows:[],bad:[]};var P={bithumb:['BTC_KRW','ETH_KRW','XRP_KRW','SOL_KRW','DOGE_KRW','ADA_KRW','AVAX_KRW','DOT_KRW','LINK_KRW','NEAR_KRW','SEI_KRW','SUI_KRW','APT_KRW','ATOM_KRW','TRX_KRW','BCH_KRW','ETC_KRW','XLM_KRW','HBAR_KRW','MATIC_KRW','ARB_KRW','OP_KRW','STX_KRW','AAVE_KRW','ALGO_KRW','SAND_KRW','MANA_KRW','FLOW_KRW','GRT_KRW','EOS_KRW','FIL_KRW'],upbit:['KRW-BTC','KRW-ETH','KRW-XRP','KRW-SOL','KRW-DOGE','KRW-ADA','KRW-AVAX','KRW-DOT','KRW-LINK','KRW-NEAR','KRW-SEI','KRW-SUI','KRW-APT','KRW-ATOM','KRW-TRX','KRW-BCH','KRW-ETC','KRW-XLM','KRW-HBAR'],binance:['BTCUSDT','ETHUSDT','XRPUSDT','SOLUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT']};var C={LOW_VOLUME:['거래량 부족','orange'],VOLUME_SURGE:['거래량 증가','green'],HIGH_CLOSE_POSITION:['종가 상단','cyan'],UPPER_WICK_RISK:['윗꼬리 리스크','red']};function $(x){return document.getElementById(x)}function esc(v){return String(v==null?'-':v).replace(/[&<>'"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function setM(){$('markets').value=(P[S.ex]||[]).join('\n');$('notice').textContent=S.ex==='bithumb'?'빗썸 본선 기준으로 스캔합니다. 결과가 부족하면 업비트 보조 검증을 선택하세요.':S.ex==='upbit'?'업비트 보조 검증으로 실행합니다. 본선 기준은 빗썸입니다.':'바이낸스 참고용 스캔입니다. 본선 기준은 빗썸입니다.'}function exL(x){x=String(x||S.ex).toLowerCase();return x==='bithumb'?'빗썸':x==='upbit'?'업비트 보조 검증':'바이낸스 참고'}function tfL(x){return x==='15m'?'15분봉':x==='1h'?'1시간봉':'5분봉'}function mkt(m){m=String(m||'');return m.replace('KRW-','').replace('_KRW','')+(m.indexOf('USDT')>0?' / USDT':' / KRW')}function grade(g){var b=String(g||'').toUpperCase().split('-').pop();return b==='A'?['A급 관찰','red']:b==='B'?['B급 관찰','orange']:b==='C'?['C급 관찰','']:b==='S'?['S급 관찰','red']:['등급 대기','']}function rev(v){v=String(v||'');return v==='HOT_REVIEW'?['우선 검토','red']:v.indexOf('WATCH')>=0?['관찰 필요','orange']:v==='LOW_SIGNAL'?['신호 약함','']:['관찰 대기','']}function tm(t){var d=new Date(t);return t&&!isNaN(d.getTime())?'감지 시각 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'):'감지 시각 대기'}function ch(l,k){return'<span class="chip '+(k||'')+'">'+esc(l)+'</span>'}function chips(a){return(Array.isArray(a)?a:[]).slice(0,4).map(function(x){var m=C[String(x)]||['기타 근거',''];return ch(m[0],m[1])}).join('')}function card(r){var g=grade(r.grade),rv=rev(r.operatorReviewLevel||r.operatorReview),sc=Math.max(0,Math.min(100,Number(r.score)||0)),ex=String(r.exchange||S.ex).toLowerCase()==='bithumb'?ch('빗썸 메인','orange'):String(r.exchange||S.ex).toLowerCase()==='upbit'?ch('업비트 보조','cyan'):ch('바이낸스 참고','yellow');return'<article class="result"><div class="rh"><span class="dot"></span><span class="coin">'+esc(mkt(r.market))+'</span><span class="score">'+sc+'점</span></div><div class="chips">'+ch(g[0],g[1])+ch(rv[0],rv[1])+(r.isCandidate?ch('후보 조건 충족','green'):ch('운영자 확인 필요','orange'))+ex+chips(r.reasonChips)+'</div><div class="bar"><i style="width:'+sc+'%"></i></div><div class="meta"><span>'+tm(r.latestTime)+'</span><span>'+exL(r.exchange)+'</span><span>'+tfL(r.timeframe)+'</span></div><button class="open">근거 펼치기 ▾</button><div class="body"><div class="sec"><h3>1. 핵심 요약</h3><p>현재: '+g[0]+' · 상태: '+rv[0]+' · 점수: '+sc+'점<br>본선 기준은 빗썸입니다.</p></div><div class="sec"><h3>3.5. 선별 근거</h3><p>현재 데이터만으로는 강한 후보로 단정하기 어렵습니다. 구조와 수급을 추가로 확인하는 관찰 구간입니다.</p></div><div class="sec"><h3>4. 구조 판단</h3><p>종가 위치와 거래량 반응을 기준으로 추가 확인합니다.</p></div><div class="sec"><h3>18. 고급 상세 / 원본 보기</h3><p>개발자용 원시값은 기본 화면에 노출하지 않습니다.</p></div></div></article>'}function sum(){var r=S.rows,b=S.bad;$('nTotal').textContent=r.length+b.length;$('nOk').textContent=r.length;$('nFail').textContent=b.length;$('nCand').textContent=r.filter(function(x){return x.isCandidate}).length;$('nWatch').textContent=r.filter(function(x){return String(x.operatorReviewLevel||'').indexOf('WATCH')>=0}).length;$('nLow').textContent=r.filter(function(x){return String(x.operatorReviewLevel||'')==='LOW_SIGNAL'}).length}function render(){var q=$('q').value.trim().toUpperCase(),r=S.rows.filter(function(x){return!q||String(x.market||'').toUpperCase().indexOf(q)>=0});r.sort(function(a,b){return Number(b.score||0)-Number(a.score||0)});$('results').className=r.length?'':'empty';$('results').innerHTML=r.length?r.map(card).join(''):'표시할 후보 카드가 없습니다.';sum()}function mkts(){return $('markets').value.split(/[\n,]+/).map(function(x){return x.trim()}).filter(Boolean).slice(0,50)}async function scan(){var ms=mkts();if(!ms.length)return;$('scan').disabled=true;$('stat').textContent='스캔 중...';try{var res=await fetch(API+'/multi-candidate-dry-run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exchange:S.ex,markets:ms,timeframe:$('tf').value,limit:Number($('limit').value)||60,maxMarkets:50})});var data=await res.json(),rows=Array.isArray(data.results)?data.results:[];S.rows=rows.filter(function(x){return x&&x.ok!==false});S.bad=rows.filter(function(x){return x&&x.ok===false});$('stat').textContent=(data.code||'스캔 완료')+' · 정상 '+S.rows.length+' / 실패 '+S.bad.length;render()}catch(e){$('stat').textContent='네트워크 오류'}finally{$('scan').disabled=false}}document.querySelectorAll('.ex').forEach(function(b){b.onclick=function(){S.ex=b.dataset.ex;document.querySelectorAll('.ex').forEach(function(x){x.classList.remove('active')});b.classList.add('active');setM()}});$('scan').onclick=scan;$('q').oninput=render;document.onclick=function(e){var b=e.target.closest('.open');if(!b)return;var c=b.closest('.result');c.classList.toggle('on');b.textContent=c.classList.contains('on')?'근거 접기 ▴':'근거 펼치기 ▾'};setM()})();</script></body></html>
