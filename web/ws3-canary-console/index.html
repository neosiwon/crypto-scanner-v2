<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WOOS Scanner V3</title>
<style>
:root{
  --bg:#080d13;--card:#0f1a27;--line:#1a2d42;--line2:#243d57;
  --cy:#00d4ff;--g:#00e676;--o:#ff8c42;--r:#ff4560;--y:#ffd600;
  --t:#e2eaf5;--s:#7a9ab8;--m:#3d5a72;
  --gl:0 0 14px rgba(0,212,255,.35);
  --gSP:#FF2D55;--gS:#FF6B35;--gA:#FF9500;--gB:#FFD60A;--gC:#8E8E93
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--t);font-family:'Noto Sans KR',system-ui,sans-serif}
.app{max-width:560px;margin:auto;padding:12px}
.hero,.card{background:linear-gradient(180deg,rgba(0,212,255,.05),rgba(15,26,39,.96));border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
.hero{border-color:rgba(0,212,255,.3);box-shadow:0 0 26px rgba(0,212,255,.12)}
h1{margin:0;color:var(--cy);font-size:20px;text-shadow:var(--gl)}
.sub,.hint,.stat{font-size:12px;color:var(--s);line-height:1.5}
.badges,.exs,.chips{display:flex;gap:6px;flex-wrap:wrap}
.badge,.chip{border:1px solid var(--line2);border-radius:999px;padding:3px 9px;font-size:11px;font-weight:800;color:var(--s);background:#0c1420}
.cyan{color:var(--cy);border-color:rgba(0,212,255,.42);background:rgba(0,212,255,.08)}
.green{color:var(--g);border-color:rgba(0,230,118,.35);background:rgba(0,230,118,.07)}
.yellow{color:var(--y);border-color:rgba(255,214,0,.35);background:rgba(255,214,0,.06)}
.orange{color:var(--o);border-color:rgba(255,140,66,.35);background:rgba(255,140,66,.08)}
.red{color:var(--r);border-color:rgba(255,69,96,.35);background:rgba(255,69,96,.08)}
.muted{color:var(--m);border-color:var(--line2);background:#0c1420}
.purple{color:#a855f7;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)}
.gSP{color:#fff;border-color:var(--gSP);background:var(--gSP)}
.gS{color:#fff;border-color:var(--gS);background:var(--gS)}
.gA{color:#000;border-color:var(--gA);background:var(--gA)}
.gB{color:#000;border-color:var(--gB);background:var(--gB)}
.gC{color:var(--t);border-color:var(--gC);background:var(--gC)}
button,select,input,textarea{border:1px solid var(--line2);border-radius:10px;background:#0c1420;color:var(--t);padding:10px;font-weight:800}
button{cursor:pointer}
.active{outline:1px solid var(--cy);box-shadow:var(--gl)}
.primary{width:100%;min-height:54px;font-size:16px;color:var(--cy);border-color:var(--cy);background:rgba(0,212,255,.09);box-shadow:var(--gl)}
.ex{flex:1;min-width:94px}
.main{color:#ff7849;border-color:rgba(244,102,90,.45);background:rgba(244,102,90,.12)}
.subex{color:#5da9ff;border-color:rgba(0,95,255,.4);background:rgba(0,95,255,.12)}
.ref{color:#f0b90b;border-color:rgba(240,185,11,.4);background:rgba(240,185,11,.1)}
textarea{width:100%;min-height:96px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.box{background:#111e2e;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.num{font:800 20px ui-monospace;color:var(--cy)}
.lbl{font-size:11px;color:var(--s)}
.tools{display:grid;grid-template-columns:1fr 110px;gap:8px;margin-top:10px}
.result{border:1px solid var(--line);border-left:4px solid var(--cy);border-radius:15px;background:linear-gradient(180deg,rgba(0,212,255,.04),var(--card));overflow:hidden;margin:10px 0}
.result.gSP{border-left-color:var(--gSP);box-shadow:0 0 18px rgba(255,45,85,.25)}
.result.gS{border-left-color:var(--gS);box-shadow:0 0 18px rgba(255,107,53,.25)}
.result.gA{border-left-color:var(--gA);box-shadow:0 0 14px rgba(255,149,0,.18)}
.result.gB{border-left-color:var(--gB)}
.result.gC{border-left-color:var(--gC)}
.rh{display:flex;align-items:center;gap:8px;padding:12px 12px 6px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:99px;background:var(--cy);box-shadow:var(--gl);flex-shrink:0}
.coin{font:800 15px ui-monospace}
.score{margin-left:auto;color:var(--cy);font:800 18px ui-monospace}
.bar{height:5px;background:#0c1420;border-radius:99px;overflow:hidden;margin:4px 12px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cy),var(--g));box-shadow:var(--gl)}
.meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--m);font:11px ui-monospace;padding:4px 12px 10px}
.open{width:100%;border:0;border-top:1px solid var(--line);border-radius:0;background:#0c1420;color:var(--s)}
.body{display:none;background:#111e2e;border-top:1px solid var(--line);padding:10px 12px}
.result.on .body{display:block}
.sec{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:10px;margin:8px 0}
.sec h3{color:var(--cy);font-size:12px;margin:0 0 6px;font-weight:800}
.sec p,.sec li{font-size:12px;line-height:1.6;margin:0;color:var(--t)}
.sec.pending{border-style:dashed;border-color:var(--line2);background:rgba(15,26,39,.6)}
.sec.pending h3{color:var(--m)}
.sec.pending p{color:var(--m);font-style:italic}
.sec ul{margin:4px 0;padding-left:20px;color:var(--s)}
.sec dl{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;margin:0;font-size:12px}
.sec dt{color:var(--s)}
.sec dd{margin:0;color:var(--t)}
.exit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:4px}
.exit-grid .ex-slot{background:#0c1420;border:1px solid var(--line);border-radius:8px;padding:6px;font-size:11px}
.exit-grid .ex-slot b{color:var(--cy);display:block;margin-bottom:2px}
.empty{border:1px dashed var(--line2);border-radius:14px;padding:20px;text-align:center;color:var(--s)}
@media(max-width:430px){.tools{grid-template-columns:1fr}.ex{min-width:0}}
</style>
</head>
<body>
<div class="app">

<section class="hero">
  <h1>WOOS Scanner V3</h1>
  <p class="sub">빗썸 메인 기준의 후보 스캐너입니다. 현재는 실사용 검증 단계입니다.</p>
  <div class="badges">
    <span class="badge cyan">준비</span>
    <span class="badge green">수동 운영</span>
    <span class="badge yellow">개발 개방 모드</span>
  </div>
</section>

<section class="card">
  <b style="color:var(--cy)">스캔 컨트롤</b>
  <p class="sub"><strong style="color:#ff7849">메인 거래소: 빗썸</strong> · 업비트 보조 검증 · 바이낸스 참고</p>
  <div class="exs">
    <button class="ex main active" data-ex="bithumb">빗썸<br><span class="hint">메인</span></button>
    <button class="ex subex" data-ex="upbit">업비트<br><span class="hint">보조</span></button>
    <button class="ex ref" data-ex="binance">바이낸스<br><span class="hint">참고</span></button>
  </div>
  <p id="notice" class="hint">빗썸 본선 기준으로 스캔합니다. 결과가 부족하면 업비트 보조 검증을 선택하세요.</p>
  <button id="scan" class="primary">스캔 시작</button>
  <details>
    <summary style="color:var(--cy);font-weight:800">고급 설정</summary>
    <p><select id="tf">
      <option value="5m">5분봉</option>
      <option value="15m">15분봉</option>
      <option value="1h">1시간봉</option>
    </select></p>
    <p><input id="limit" value="60"></p>
    <p><textarea id="markets"></textarea></p>
  </details>
</section>

<section class="card">
  <div class="grid">
    <div class="box"><div id="nTotal" class="num">0</div><div class="lbl">전체</div></div>
    <div class="box"><div id="nOk" class="num">0</div><div class="lbl">정상</div></div>
    <div class="box"><div id="nCand" class="num">0</div><div class="lbl">후보</div></div>
    <div class="box"><div id="nWatch" class="num">0</div><div class="lbl">관찰</div></div>
    <div class="box"><div id="nLow" class="num">0</div><div class="lbl">신호 약함</div></div>
    <div class="box"><div id="nFail" class="num">0</div><div class="lbl">실패</div></div>
  </div>
  <div class="tools">
    <input id="q" placeholder="코인명 검색">
    <select id="sort">
      <option value="score">점수순</option>
      <option value="latest">최신순</option>
    </select>
  </div>
</section>

<section class="card">
  <b style="color:var(--cy)">후보 카드</b>
  <span id="stat" class="stat">스캔 대기 중</span>
  <div id="results" class="empty">스캔을 시작하면 후보 카드가 여기에 표시됩니다.</div>
</section>

</div>
<script>
(function(){
'use strict';

// ═══════════════════════════════════════════════════════════════════
// WS3 v0.35.0 Phase 1 — Card Connection
// 백서 §16.2 헤더 8 슬롯 / §16.4 바디 18 섹션 / cardViewModel + rendererBinding 기반
// raw·debug·operatorReview·reasonChips 노출 0 / 운영 콘솔 패널 신규 0
// ═══════════════════════════════════════════════════════════════════

var API = 'https://ws3-telegram-canary.neosiwon.workers.dev';
var S = { ex: 'bithumb', rows: [], bad: [] };

var P = {
  bithumb: ['BTC_KRW','ETH_KRW','XRP_KRW','SOL_KRW','DOGE_KRW','ADA_KRW','AVAX_KRW','DOT_KRW','LINK_KRW','NEAR_KRW','SEI_KRW','SUI_KRW','APT_KRW','ATOM_KRW','TRX_KRW','BCH_KRW','ETC_KRW','XLM_KRW','HBAR_KRW','MATIC_KRW','ARB_KRW','OP_KRW','STX_KRW','AAVE_KRW','ALGO_KRW','SAND_KRW','MANA_KRW','FLOW_KRW','GRT_KRW','EOS_KRW','FIL_KRW'],
  upbit: ['KRW-BTC','KRW-ETH','KRW-XRP','KRW-SOL','KRW-DOGE','KRW-ADA','KRW-AVAX','KRW-DOT','KRW-LINK','KRW-NEAR','KRW-SEI','KRW-SUI','KRW-APT','KRW-ATOM','KRW-TRX','KRW-BCH','KRW-ETC','KRW-XLM','KRW-HBAR'],
  binance: ['BTCUSDT','ETHUSDT','XRPUSDT','SOLUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT']
};

// ═══════════════════════════════════════════════════════════════════
// 한글 매핑 (v3-config.DISPLAY 참조 / raw enum 사용자 노출 0)
// ═══════════════════════════════════════════════════════════════════
var GRADE_LABEL = { 'S+':'S+급 후보','S':'S급 후보','A':'A급 후보','B':'B급 관찰','C':'C급 관찰','NONE':'등급없음' };
var GRADE_CLASS = { 'S+':'gSP','S':'gS','A':'gA','B':'gB','C':'gC','NONE':'muted' };

var STRATEGY_LABEL = {
  'SCALP':['단타','red'], 'SWING':['스윙','cyan'], 'SCALP_SWING':['단타→스윙','orange'],
  'WATCH':['관찰',''], 'AVOID':['회피','muted'],
  'NO_TRADE':['거래 안함','muted'], 'WATCH_ONLY':['관찰만',''],
  'PULLBACK_WAIT':['눌림 대기','cyan'], 'BREAKOUT_READY':['돌파 준비','red'],
  'RECLAIM_READY':['회복 준비','orange'], 'MOMENTUM_FOLLOW':['모멘텀 추종','red'],
  'RISK_OFF':['위험 회피','muted'], 'COOLDOWN_WAIT':['쿨다운','yellow'],
  'EXPIRED_IGNORE':['신호 종료','muted']
};

var STRUCTURE_LABEL = {
  'BOX_PRESSURE':['박스 압박','red'], 'BOX_BREAKOUT':['박스 돌파','red'],
  'OB_RECLAIM':['OB 회복','cyan'], 'LOW_SWEEP_RECLAIM':['저점 회복','cyan'],
  'MA_RECLAIM':['MA 회복','cyan'],
  'BOX_TOP_PRESSURE':['박스 상단 압박','red'], 'BREAKOUT_PRESSURE_CANDIDATE':['돌파 압박','red'],
  'ABOVE_BOX_CONFIRMED_CANDIDATE':['박스 위 확정','red'], 'BOX_BOTTOM_RISK':['박스 하단 위험','orange'],
  'BREAKDOWN_RISK_CANDIDATE':['하락 위험','orange'], 'BELOW_BOX_CONFIRMED_CANDIDATE':['박스 아래 확정','orange'],
  'LOW_SWEEP_PENDING':['저점 휩쓸기 대기','yellow'], 'LOW_SWEEP_RECLAIM_CANDIDATE':['저점 회복','cyan'],
  'RECLAIM_READY':['회복 준비','cyan'], 'HIGH_SWEEP_REJECT_CANDIDATE':['고점 거부','orange']
};

var PERSISTENCE_LABEL = {
  'single':['단일',''], 'repeat':['반복','yellow'],
  'strong_repeat':['강한 반복','orange'], 'hot_cycle':['핫사이클','red']
};

var CYCLE_PHASE_LABEL = {
  'SEED':'시드', 'ACTIVE':'활성', 'COOLING':'쿨다운', 'ENDED':'종료',
  'NEW_CANDIDATE':'신규','PERSISTING':'지속','STRENGTHENING':'강화','WEAKENING':'약화'
};

var EXIT_LABEL = { A:'구조분할', B:'ATR 트레일링', C:'TP1 본절', D:'무효화', E:'시간제한', F:'거래량소멸' };

// ═══════════════════════════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════════════════════════
function $(x){ return document.getElementById(x); }
function esc(v){
  return String(v==null?'-':v).replace(/[&<>'"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function mkt(m){ m = String(m||''); return m.replace('KRW-','').replace('_KRW','') + (m.indexOf('USDT')>0 ? ' / USDT' : ' / KRW'); }
function tfL(x){ return x==='15m'?'15분봉':x==='1h'?'1시간봉':'5분봉'; }
function exL(x){ x = String(x||S.ex).toLowerCase(); return x==='bithumb'?'빗썸':x==='upbit'?'업비트 보조 검증':'바이낸스 참고'; }
function tm(t){ var d = new Date(t); return t && !isNaN(d.getTime()) ? '감지 시각 ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') : '감지 시각 대기'; }
function chip(label, klass){ return '<span class="chip ' + (klass||'') + '">' + esc(label) + '</span>'; }
function round1(n){ return (typeof n === 'number' && isFinite(n)) ? Math.round(n*10)/10 : '-'; }

function setM(){
  $('markets').value = (P[S.ex] || []).join('\n');
  $('notice').textContent = S.ex==='bithumb'
    ? '빗썸 본선 기준으로 스캔합니다. 결과가 부족하면 업비트 보조 검증을 선택하세요.'
    : S.ex==='upbit' ? '업비트 보조 검증으로 실행합니다. 본선 기준은 빗썸입니다.'
    : '바이낸스 참고용 스캔입니다. 본선 기준은 빗썸입니다.';
}

// ═══════════════════════════════════════════════════════════════════
// 헤더 chip 빌더 (백서 §16.2 8 슬롯 / alwaysShow 3 + mobileMax 5)
// ═══════════════════════════════════════════════════════════════════
function gradeChip(g){
  var u = String(g||'').toUpperCase().replace(/^P-/, '');  // P-prefix 잔존 안전망
  var k = GRADE_CLASS[u] || 'muted';
  var l = GRADE_LABEL[u] || '등급 대기';
  return '<span class="chip ' + k + '">' + esc(l) + '</span>';
}
function strategyChip(b){
  if(!b || b==='UNKNOWN' || b==='NONE') return '';
  var v = STRATEGY_LABEL[b]; return v ? chip(v[0], v[1]) : '';
}
function structureChip(b){
  if(!b || b==='UNKNOWN' || b==='NO_STRUCTURE' || b==='NO_SIGNAL') return '';
  var v = STRUCTURE_LABEL[b]; return v ? chip(v[0], v[1]) : '';
}
function persistenceChip(p){
  if(!p || p==='single') return '';  // single 은 일반 = chip 생략
  var v = PERSISTENCE_LABEL[p]; return v ? chip(v[0], v[1]) : '';
}
function exchangeChip(){ return chip('빗썸 메인', 'orange'); }

function buildHeaderChips(r){
  var chips = [
    gradeChip(r.grade),
    strategyChip(r.strategyBias),
    structureChip(r.structureBucket),
    persistenceChip(r.signalPersistence),
    (r.isCandidate ? chip('후보','green') : chip('관찰','')),
    exchangeChip()
  ].filter(Boolean);
  return chips.slice(0, 6).join('');  // mobileMax 5~6
}

// ═══════════════════════════════════════════════════════════════════
// 바디 섹션 빌더 (백서 §16.4 18 섹션 / 미구현 = "데이터 수집 중")
// ═══════════════════════════════════════════════════════════════════
function section(num, title, contentHtml){
  if (contentHtml) {
    return '<div class="sec"><h3>' + num + '. ' + title + '</h3>' + contentHtml + '</div>';
  }
  // 미구현 / 데이터 없음 = "데이터 수집 중" (메모리 #27 / 절대 삭제 X)
  return '<div class="sec pending"><h3>' + num + '. ' + title + '</h3><p>데이터 수집 중</p></div>';
}

function renderSec1(r, cvm){
  var g = GRADE_LABEL[String(r.grade||'NONE').toUpperCase().replace(/^P-/, '')] || '등급 대기';
  var s = STRATEGY_LABEL[r.strategyBias] ? STRATEGY_LABEL[r.strategyBias][0] : '판단 대기';
  return '<p>현재: <b style="color:var(--cy)">' + esc(g) + '</b> · 전략 성향: <b style="color:var(--cy)">' + esc(s) + '</b> · 점수: <b style="color:var(--cy)">' + Math.round(r.score||0) + '점</b><br>본선 기준은 빗썸입니다.</p>';
}

function renderSec3(r){
  var sb = r.scoreBreakdown;
  if (!sb) return null;
  // 백서 §6.1 점수 구성 (v3-score-breakdown.components 실제 키)
  var keys = ['core','structure','volume','momentum','execution'];
  var labels = {core:'코어',structure:'구조',volume:'거래량·수급',momentum:'모멘텀',execution:'실행'};
  var rows = keys.map(function(k){
    var v = sb[k];
    var n = (v && typeof v.score === 'number') ? round1(v.score) : (typeof v === 'number' ? round1(v) : '-');
    return '<dt>' + labels[k] + '</dt><dd>' + n + '</dd>';
  }).join('');
  // 리스크 페널티 (별도 top-level 필드)
  if (typeof sb.riskPenalty === 'number' && sb.riskPenalty > 0) {
    rows += '<dt style="color:var(--r)">리스크 페널티</dt><dd style="color:var(--r)">-' + round1(sb.riskPenalty) + '</dd>';
  }
  return '<dl>' + rows + '</dl>';
}

function renderSec35(cvm){
  var reasons = (cvm && Array.isArray(cvm.reasons)) ? cvm.reasons : [];
  if (!reasons.length) return null;
  var items = reasons.slice(0, 6).map(function(rn){
    var txt = (typeof rn === 'string') ? rn : (rn && (rn.label || rn.message || rn.reason || rn.code)) || '';
    return txt ? '<li>' + esc(txt) + '</li>' : '';
  }).filter(Boolean).join('');
  return items ? '<ul>' + items + '</ul>' : null;
}

function renderSec4(r){
  var sb = STRUCTURE_LABEL[r.structureBucket];
  if (!sb) return null;
  var pz = r.priceZone;
  var zone = pz && pz.zone ? ({TOP_NEAR:'상단 근접',BOTTOM_NEAR:'하단 근접',MIDDLE:'중간',UNKNOWN:'미분류'}[pz.zone] || pz.zone) : null;
  var html = '<p><b>' + esc(sb[0]) + '</b></p>';
  if (zone) html += '<p class="sub">가격 위치: ' + esc(zone) + '</p>';
  return html;
}

function renderSec7(r){
  var s = STRATEGY_LABEL[r.strategyBias];
  if (!s) return null;
  var plan = r.planType && r.planType !== 'NONE' ? r.planType : null;
  var html = '<p><b>' + esc(s[0]) + '</b>';
  if (plan) {
    var planL = {WATCH:'관찰',PULLBACK:'눌림 대기',BREAKOUT:'돌파',RECLAIM:'회복'}[plan] || plan;
    html += ' · 플랜: ' + esc(planL);
  }
  html += '</p>';
  return html;
}

function renderSec8(r){
  var ep = r.entryPlan;
  if (!ep || typeof ep !== 'object') return null;
  // entryPlan 의 zones / triggers / size 등 안전 추출
  if (ep.zones && Array.isArray(ep.zones) && ep.zones.length) {
    var rows = ep.zones.slice(0, 3).map(function(z, i){
      var label = ['1차','2차','3차'][i] || ((i+1)+'차');
      var price = (z && typeof z.price === 'number') ? z.price : null;
      var size = (z && typeof z.sizePct === 'number') ? z.sizePct + '%' : null;
      return '<dt>' + label + '</dt><dd>' + (price !== null ? price : '-') + (size ? ' · ' + size : '') + '</dd>';
    }).join('');
    return '<dl>' + rows + '</dl>';
  }
  return null;
}

function renderSec9(r){
  var xp = r.exitPlan;
  if (!xp || typeof xp !== 'object') return null;
  var keys = ['A','B','C','D','E','F'];
  var slots = keys.map(function(k){
    var slot = xp[k] || xp['EXIT_' + k];
    var enabled = !!(slot && (slot.enabled || slot.active));
    return '<div class="ex-slot"><b>' + k + ' · ' + EXIT_LABEL[k] + '</b>' + (enabled ? '<span class="chip cyan" style="margin-left:4px">활성</span>' : '<span class="chip muted" style="margin-left:4px">대기</span>') + '</div>';
  }).join('');
  return '<div class="exit-grid">' + slots + '</div>';
}

function renderSec11(r){
  var p = r.signalPersistence;
  var l = PERSISTENCE_LABEL[p];
  if (!l) return null;
  var phase = CYCLE_PHASE_LABEL[r.signalCyclePhase] || r.signalCyclePhase || '판단 대기';
  return '<p>반복 신호: <b>' + esc(l[0]) + '</b> · 위상: <b>' + esc(phase) + '</b></p>';
}

function renderSec12(cvm){
  if (!cvm || !cvm.metrics || !cvm.metrics.indicators) return null;
  var ind = cvm.metrics.indicators;
  var pick = ['rsi','mfi','obvSlope','atrPct','closePosition'];
  var labels = {rsi:'RSI',mfi:'MFI',obvSlope:'OBV 기울기',atrPct:'ATR %',closePosition:'종가 위치'};
  var rows = pick.map(function(k){
    var v = ind[k];
    if (v == null || (typeof v !== 'number' && !v.value)) return '';
    var n = typeof v === 'number' ? round1(v) : (v.value != null ? round1(v.value) : '-');
    return '<dt>' + labels[k] + '</dt><dd>' + n + '</dd>';
  }).filter(Boolean).join('');
  return rows ? '<dl>' + rows + '</dl>' : null;
}

function renderSec16(rb){
  if (!rb || !rb.sections || !rb.sections.confluence) return null;
  var c = rb.sections.confluence;
  var label = c.label || c.confluenceLabel || c.level;
  return label ? '<p>외부 보조 confluence: <b>' + esc(label) + '</b></p>' : null;
}

function renderSec17(rb){
  if (!rb || !rb.sections || !rb.sections.evaluation) return null;
  var ev = rb.sections.evaluation;
  var status = ev.status || ev.outcomeStatus;
  if (!status) return '<p class="sub">사후평가 데이터 누적 중</p>';
  var labels = {UNKNOWN:'미정',PENDING:'대기',IN_PROGRESS:'진행 중',COMPLETED:'완료',CLOSED:'종결',INVALID:'무효'};
  return '<p>상태: <b>' + esc(labels[status] || status) + '</b></p>';
}

function renderBody(r){
  var cvm = r.cardViewModel || {};
  var rb  = r.rendererBinding || {};
  return [
    section('1', '핵심 요약',          renderSec1(r, cvm)),
    section('2', '헤더 해석',          null),                       // 미구현
    section('3', '점수 요약',          renderSec3(r)),
    section('3.5', '선별 근거',        renderSec35(cvm)),
    section('4', '구조 판단',          renderSec4(r)),
    section('5', '매수세·수급',        null),                       // P1 분류기
    section('6', '시장 상황',          null),                       // P1 분류기
    section('7', '전략 성향',          renderSec7(r)),
    section('8', '진입 가이드',        renderSec8(r)),
    section('9', '매도전략 A-F',       renderSec9(r)),
    section('10', '세력예상가',        null),                       // P1
    section('11', '반복 신호',         renderSec11(r)),
    section('12', '지표 상세',         renderSec12(cvm)),
    section('13', '코인 메타',         null),                       // P1
    section('14', '뉴스',              null),                       // P2
    section('15', '시장 참고',         null),                       // P2
    section('16', '외부 보조',         renderSec16(rb)),
    section('17', '사후평가',          renderSec17(rb)),
    section('18', '고급 상세',         '<p>개발자용 원시값은 기본 화면에 노출되지 않습니다.</p>')
  ].join('');
}

// ═══════════════════════════════════════════════════════════════════
// 카드 렌더
// ═══════════════════════════════════════════════════════════════════
function cardError(r){
  return '<article class="result"><div class="rh"><span class="dot"></span><span class="coin">' + esc(mkt(r.market)) + '</span><span class="chip red" style="margin-left:auto">' + esc(r.code || 'ERROR') + '</span></div><div class="meta"><span>' + esc(r.market) + '</span></div></article>';
}

function card(r){
  if (!r.ok) return cardError(r);
  var g = String(r.grade||'NONE').toUpperCase().replace(/^P-/, '');
  var gradeClass = GRADE_CLASS[g] || 'muted';
  var sc = Math.max(0, Math.min(100, Number(r.score)||0));
  return [
    '<article class="result ' + gradeClass + '">',
      '<div class="rh">',
        '<span class="dot"></span>',
        '<span class="coin">', esc(mkt(r.market)), '</span>',
        '<span class="score">', sc, '점</span>',
      '</div>',
      '<div class="chips" style="padding:0 12px 6px">',
        buildHeaderChips(r),
      '</div>',
      '<div class="bar"><i style="width:', sc, '%"></i></div>',
      '<div class="meta">',
        '<span>', tm(r.latestTime), '</span>',
        '<span>', exL(r.exchange || S.ex), '</span>',
        '<span>', tfL($('tf').value), '</span>',
      '</div>',
      '<button class="open">근거 펼치기 ▾</button>',
      '<div class="body">', renderBody(r), '</div>',
    '</article>'
  ].join('');
}

// ═══════════════════════════════════════════════════════════════════
// 통계 / 렌더 / 스캔
// ═══════════════════════════════════════════════════════════════════
function sum(){
  var r = S.rows, b = S.bad;
  $('nTotal').textContent = r.length + b.length;
  $('nOk').textContent    = r.length;
  $('nFail').textContent  = b.length;
  $('nCand').textContent  = r.filter(function(x){ return x.isCandidate; }).length;
  $('nWatch').textContent = r.filter(function(x){
    var b = String(x.strategyBias||'').toUpperCase();
    return b === 'WATCH' || b === 'WATCH_ONLY';
  }).length;
  $('nLow').textContent   = r.filter(function(x){
    return (Number(x.score)||0) < 40;
  }).length;
}

function render(){
  var q = $('q').value.trim().toUpperCase();
  var r = S.rows.filter(function(x){ return !q || String(x.market||'').toUpperCase().indexOf(q) >= 0; });
  r.sort(function(a, b){ return Number(b.score||0) - Number(a.score||0); });
  $('results').className = r.length ? '' : 'empty';
  $('results').innerHTML = r.length ? r.map(card).join('') : '표시할 후보 카드가 없습니다.';
  sum();
}

function mkts(){
  return $('markets').value.split(/[\n,]+/).map(function(x){ return x.trim(); }).filter(Boolean).slice(0, 50);
}

async function scan(){
  var ms = mkts();
  if (!ms.length) return;
  $('scan').disabled = true;
  $('stat').textContent = '스캔 중...';
  try{
    var res = await fetch(API + '/multi-candidate-dry-run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        exchange: S.ex,
        markets: ms,
        timeframe: $('tf').value,
        limit: Number($('limit').value) || 60,
        maxMarkets: 50,
        manualTrigger: true
      })
    });
    var data = await res.json();
    var rows = Array.isArray(data.results) ? data.results : [];
    S.rows = rows.filter(function(x){ return x && x.ok !== false; });
    S.bad  = rows.filter(function(x){ return x && x.ok === false; });
    $('stat').textContent = (data.code || '스캔 완료') + ' · 정상 ' + S.rows.length + ' / 실패 ' + S.bad.length;
    render();
  } catch(e) {
    $('stat').textContent = '네트워크 오류';
  } finally {
    $('scan').disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════════════
// 이벤트 바인딩
// ═══════════════════════════════════════════════════════════════════
document.querySelectorAll('.ex').forEach(function(b){
  b.onclick = function(){
    S.ex = b.dataset.ex;
    document.querySelectorAll('.ex').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active');
    setM();
  };
});
$('scan').onclick = scan;
$('q').oninput = render;
document.onclick = function(e){
  var b = e.target.closest && e.target.closest('.open');
  if (!b) return;
  var c = b.closest('.result');
  c.classList.toggle('on');
  b.textContent = c.classList.contains('on') ? '근거 접기 ▴' : '근거 펼치기 ▾';
};
setM();

})();
</script>
</body>
</html>
